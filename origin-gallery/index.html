<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 创意工坊 — Claude 每五分钟生成不同风格</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE156; --pink: #FF6B9D; --blue: #4ECDC4;
    --green: #C7F464; --coral: #FF6B6B; --cream: #FFF8E7;
    --dark: #2D2B55; --ink: #1a1a2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--ink); font-family:'Nunito',sans-serif; overflow-x:hidden; }

  /* Dots bg */
  .dots { position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:radial-gradient(var(--ink) 1px,transparent 1px);
    background-size:20px 20px; opacity:0.03; }

  /* Header */
  .header { max-width:1100px; margin:0 auto; padding:2.5rem 2rem 1.5rem; position:relative; z-index:1;
    display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; }
  .header-left {}
  .brand { display:flex; align-items:baseline; gap:0.5rem; }
  .brand-name { font-family:'Fredoka One',cursive; font-size:2.2rem; color:var(--dark); }
  .brand-label { font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--pink); }
  .gen-line { display:flex; align-items:center; gap:0.5rem; margin-top:0.4rem; font-size:0.95rem; color:var(--dark); font-weight:600; }
  .claude-icon { height:24px; width:auto; vertical-align:middle; animation:ccBounce 2s ease-in-out infinite; }
  .spinner { display:inline-block; width:14px; height:14px; border:2.5px solid var(--pink); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-left:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes ccBounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }
  .credit { font-size:0.8rem; color:#888; margin-top:0.2rem; }
  .credit-link { color:var(--dark); font-weight:700; text-decoration:none; border-bottom:2px solid var(--pink); transition:color 0.2s; }
  .credit-link:hover { color:var(--pink); }

  .fav-btn { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.9rem;
    padding:0.6em 1.4em; border-radius:12px; border:3px solid var(--dark); cursor:pointer;
    background:var(--cream); color:var(--dark); display:flex; align-items:center; gap:0.4rem;
    transition:all 0.2s; white-space:nowrap; }
  .fav-btn:hover { background:var(--yellow); }
  .fav-btn.active { background:var(--yellow); border-color:var(--coral); color:var(--coral); }
  .fav-btn .star { font-size:1.2rem; }

  /* Decorative shapes */
  .deco { position:absolute; z-index:0; pointer-events:none; }
  .deco-circle { border-radius:50%; }

  /* Gallery */
  .gallery { max-width:1100px; margin:0 auto; padding:0 2rem 1rem; position:relative; z-index:1;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.2rem; }

  /* Card */
  .card { display:block; text-decoration:none; color:inherit; background:#fff;
    border:3px solid var(--dark); border-radius:16px; overflow:hidden; position:relative;
    transition:transform 0.25s,box-shadow 0.25s; box-shadow:4px 4px 0 var(--dark); }
  .card:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--dark); }

  .card-preview { height:190px; position:relative; overflow:hidden; background:#e8e2d8;
    border-bottom:3px solid var(--dark); }
  .card-preview iframe { position:absolute; top:0; left:0; width:400%; height:400%;
    transform:scale(0.25); transform-origin:top left; pointer-events:none; border:none; }

  .card-actions { position:absolute; top:8px; right:8px; display:flex; gap:5px; z-index:3; }
  .act-btn { width:34px; height:34px; border-radius:10px; display:flex; align-items:center;
    justify-content:center; font-size:1rem; cursor:pointer; border:2px solid var(--dark);
    background:var(--cream); color:var(--dark); text-decoration:none; transition:all 0.15s; }
  .act-btn:hover { background:var(--yellow); }
  .act-btn.faved { background:var(--coral); color:#fff; border-color:var(--coral); }

  .card-body { padding:1rem 1.2rem 1.2rem; }
  .card-num { font-family:'Fredoka One',cursive; font-size:0.7rem; color:var(--pink); margin-bottom:0.15rem; }
  .card-name { font-weight:800; font-size:1.05rem; margin-bottom:0.2rem; }
  .card-desc { font-size:0.8rem; color:#666; line-height:1.5; margin-bottom:0.5rem;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .card-tag { font-size:0.65rem; font-weight:700; padding:0.2em 0.6em; border-radius:6px;
    border:1.5px solid var(--dark); background:var(--cream); color:var(--dark); }
  .card-tag:nth-child(3n+1) { background:rgba(78,205,196,0.15); }
  .card-tag:nth-child(3n+2) { background:rgba(255,107,157,0.12); }
  .card-tag:nth-child(3n) { background:rgba(255,225,86,0.2); }

  /* Empty */
  .empty { grid-column:1/-1; text-align:center; padding:4rem 2rem; }
  .empty-icon { font-size:3rem; }
  .empty-text { font-size:1.1rem; color:#888; margin-top:0.5rem; }

  /* Pager */
  .pager { max-width:1100px; margin:0 auto; padding:1.5rem 2rem 2rem;
    display:flex; justify-content:center; align-items:center; gap:0.4rem; flex-wrap:wrap; position:relative; z-index:1; }
  .pg-btn { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem;
    padding:0.4em 0.85em; border-radius:10px; border:2px solid var(--dark); cursor:pointer;
    background:var(--cream); color:var(--dark); transition:all 0.15s; min-width:36px; text-align:center; }
  .pg-btn:hover:not(:disabled):not(.pg-active) { background:var(--yellow); }
  .pg-btn.pg-active { background:var(--dark); color:var(--cream); }
  .pg-btn:disabled { opacity:0.3; cursor:default; }
  .pg-dots { color:#aaa; font-size:0.8rem; padding:0 0.2em; }

  /* Footer — Memphis style */
  .footer { background:var(--dark); color:var(--cream); padding:2.5rem 3rem; display:flex;
    justify-content:space-between; align-items:center; position:relative; z-index:1;
    clip-path:polygon(0 15%,100% 0%,100% 100%,0% 100%); padding-top:3.5rem; margin-top:1rem; }
  .footer-brand { font-family:'Fredoka One',cursive; font-size:0.95rem; color:var(--yellow); }
  .footer-desc { font-size:0.85rem; color:rgba(255,248,231,0.55); line-height:1.8; margin-top:0.6rem; max-width:500px; }
  .footer-wx { font-size:0.9rem; font-weight:700; color:var(--yellow); margin-top:0.5rem; letter-spacing:0.03em; }
  .footer-social { display:flex; gap:0.7rem; }
  .footer-social a { width:36px; height:36px; border:3px solid var(--cream); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-family:'Nunito',sans-serif;
    font-size:0.6rem; font-weight:800; color:var(--cream); text-decoration:none;
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .footer-social a:hover { background:var(--yellow); border-color:var(--yellow); color:var(--dark);
    transform:scale(1.2) rotate(-10deg); }

  @media (max-width:700px) {
    .header { padding:1.5rem 1rem 1rem; }
    .gallery { padding:0 1rem; grid-template-columns:1fr; }
    .pager { padding:1rem; }
    .brand-name { font-size:1.6rem; }
    .footer { flex-direction:column; gap:1.2rem; text-align:center; padding:3.5rem 1.5rem 2rem;
      clip-path:polygon(0 6%,100% 0%,100% 100%,0% 100%); }
  }
</style>
</head>
<body>
<div class="dots"></div>

<!-- Decorative shapes -->
<div class="deco deco-circle" style="width:120px;height:120px;background:var(--yellow);opacity:0.15;top:60px;right:8%;"></div>
<div class="deco" style="width:60px;height:60px;background:var(--pink);opacity:0.1;top:200px;left:5%;transform:rotate(25deg);"></div>
<div class="deco deco-circle" style="width:80px;height:80px;background:var(--blue);opacity:0.1;top:400px;right:3%;"></div>
<div class="deco" style="width:40px;height:40px;background:var(--green);opacity:0.12;top:600px;left:8%;transform:rotate(45deg);"></div>

<header class="header">
  <div class="header-left">
    <div class="brand">
      <span class="brand-name">HTML</span>
      <span class="brand-label">创意工坊</span>
    </div>
    <div class="gen-line"><img src="image.png" alt="Claude" class="claude-icon"> Claude 正在持续生成 HTML 库 <span class="spinner"></span></div>
    <div class="credit">powered by <a href="https://github.com/cheafon" target="_blank" class="credit-link">cheafon</a></div>
  </div>
  <button class="fav-btn" id="favFilter" onclick="toggleFavFilter()">
    <span class="star">★</span> 收藏夹
  </button>
</header>

<div class="gallery" id="gallery"></div>
<div class="pager" id="pager"></div>

<footer class="footer">
  <div class="footer-brand">HTML 创意工坊</div>
  <div class="footer-desc">为了缓解 token 用不完的焦虑，利用 Claude Code's Loop & Claude's Schedule 帮我自动生成 HTML 库，欢迎大家加入交流群，分享一些 AI 点子和前沿知识。</div>
  <div class="footer-wx">WX：kai9121000</div>
  <div class="footer-social">
    <a href="https://github.com/cheafon" target="_blank">GitHub</a>
  </div>
</footer>

<script>
const META = {
  'wabisabi-roaster': { name: '山雾 MISTY · 侘寂烘焙', desc: '独立咖啡烘焙 — 温暖米白+墨灰+焦糖棕、Cormorant Garamond+Noto Serif SC、极简单列巨大留白+细线分隔+完全静态零动效、日式侘寂极简', tags: ['light','wabisabi','coffee','minimal','japanese','static'] },
  'memphis-pet': { name: '毛毛家 PAWHAUS · 孟菲斯宠物', desc: '宠物寄养民宿 — 奶油底+活力粉+薄荷蓝+柠檬黄、Fredoka One+ZCOOL快乐体、粗黑描边偏移阴影卡片+倾斜色块+弹跳动画+波点纹理、80s孟菲斯波普', tags: ['light','memphis','pet','playful','colorful','animated'] },
};

let styles = Object.entries(META).map(([id, m]) => ({ id, ...m }));
let favs = JSON.parse(localStorage.getItem('origin-favs') || '[]');
let showFavsOnly = false;
const PER_PAGE = 12;
let currentPage = parseInt(sessionStorage.getItem('gallery-page') || '1');
const gallery = document.getElementById('gallery');
const pagerEl = document.getElementById('pager');
const favFilterBtn = document.getElementById('favFilter');

const isFav = id => favs.includes(id);
function toggleFav(id) {
  favs = isFav(id) ? favs.filter(f=>f!==id) : [...favs, id];
  localStorage.setItem('origin-favs', JSON.stringify(favs));
  renderPage();
}
function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  favFilterBtn.classList.toggle('active', showFavsOnly);
  currentPage = 1; renderPage();
}

function renderPage() {
  const filtered = styles.map((s,i)=>({...s,gi:i})).filter(s => !showFavsOnly || isFav(s.id));
  const tp = Math.ceil(filtered.length/PER_PAGE)||1;
  if (currentPage>tp) currentPage=tp;
  sessionStorage.setItem('gallery-page', String(currentPage));
  const items = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  gallery.innerHTML = '';
  if (!items.length) {
    gallery.innerHTML = '<div class="empty"><div class="empty-icon">☕</div><div class="empty-text">' +
      (showFavsOnly ? '还没有收藏，点击卡片上的 ★ 添加！' : '没有匹配的风格') + '</div></div>';
    pagerEl.innerHTML = ''; return;
  }

  items.forEach(s => {
    const i = s.gi;
    const c = document.createElement('a');
    c.className = 'card';
    c.href = 'styles/origin-' + s.id + '.html';
    c.innerHTML = '<div class="card-preview"><iframe src="styles/origin-' + s.id + '.html" loading="lazy" sandbox="allow-same-origin allow-scripts" tabindex="-1"></iframe></div>' +
      '<div class="card-actions">' +
      '<button class="act-btn ' + (isFav(s.id)?'faved':'') + '" onclick="event.stopPropagation();event.preventDefault();toggleFav(\'' + s.id + '\')" title="收藏">' + (isFav(s.id)?'★':'☆') + '</button>' +
      '<a class="act-btn" href="styles/origin-' + s.id + '.html" download="origin-' + s.id + '.html" onclick="event.stopPropagation()" title="下载">↓</a></div>' +
      '<div class="card-body"><div class="card-num">#' + String(i+1).padStart(3,'0') + '</div>' +
      '<div class="card-name">' + s.name + '</div><div class="card-desc">' + s.desc + '</div>' +
      '<div class="card-tags">' + (s.tags||[]).map(t=>'<span class="card-tag">'+t+'</span>').join('') + '</div></div>';
    gallery.appendChild(c);
  });

  // Pager
  pagerEl.innerHTML = '';
  if (tp <= 1) return;
  const mk = (l,p,d,a) => { const b=document.createElement('button'); b.className='pg-btn'+(a?' pg-active':''); b.textContent=l; b.disabled=d;
    if(!d&&!a) b.onclick=()=>{currentPage=p;renderPage();window.scrollTo({top:0,behavior:'smooth'});}; return b; };
  pagerEl.appendChild(mk('‹',currentPage-1,currentPage<=1));
  let pgs=[]; if(tp<=7){for(let p=1;p<=tp;p++)pgs.push(p);}
  else{pgs=[1];let lo=Math.max(2,currentPage-1),hi=Math.min(tp-1,currentPage+1);
    if(lo>2)pgs.push('…');for(let p=lo;p<=hi;p++)pgs.push(p);if(hi<tp-1)pgs.push('…');pgs.push(tp);}
  pgs.forEach(p=>{if(p==='…'){const s=document.createElement('span');s.className='pg-dots';s.textContent='…';pagerEl.appendChild(s);}
    else pagerEl.appendChild(mk(String(p),p,false,p===currentPage));});
  pagerEl.appendChild(mk('›',currentPage+1,currentPage>=tp));
}
renderPage();
</script>
</body>
</html>
