<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的菜谱本 — 灶神 HEARTH</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root{--wall:#2A2D35;--chalk:#F0EDE6;--coral:#FF8A7A;--teal:#5EC4B6;--yellow:#FFD54F;--lilac:#B39DDB;--dim:rgba(240,237,230,0.2)}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--wall);color:var(--chalk);font-family:'ZCOOL KuaiLe','Permanent Marker',cursive;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* Brick mortar lines */
    background-image:
      repeating-linear-gradient(0deg,transparent 0px,transparent 36px,rgba(240,237,230,0.008) 36px,rgba(240,237,230,0.008) 37px,transparent 37px,transparent 74px),
      repeating-linear-gradient(90deg,transparent 0px,transparent 70px,rgba(240,237,230,0.005) 70px,rgba(240,237,230,0.005) 71px,transparent 71px,transparent 142px)}

  .grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.035}

  .page{max-width:460px;width:100%;position:relative;z-index:1}

  /* Chalk text glow */
  .chalk{text-shadow:0 0 3px rgba(240,237,230,0.3),1px 0 1px rgba(240,237,230,0.15)}
  .chalk-coral{color:var(--coral);text-shadow:0 0 4px rgba(255,138,122,0.3),1px 0 2px rgba(255,138,122,0.15)}
  .chalk-teal{color:var(--teal);text-shadow:0 0 4px rgba(94,196,182,0.3),1px 0 2px rgba(94,196,182,0.15)}
  .chalk-yellow{color:var(--yellow);text-shadow:0 0 4px rgba(255,213,79,0.3),1px 0 2px rgba(255,213,79,0.15)}
  .chalk-lilac{color:var(--lilac);text-shadow:0 0 4px rgba(179,157,219,0.3),1px 0 2px rgba(179,157,219,0.15)}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.2rem;animation:chalkDraw .6s ease both}
  @keyframes chalkDraw{from{opacity:0;transform:scale(0.95) rotate(-1deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  .h-brand{font-size:2.2rem;letter-spacing:0.06em}
  .h-en{font-family:'Permanent Marker',cursive;font-size:0.75rem;color:var(--dim);letter-spacing:0.2em}
  .h-sub{font-size:0.92rem;color:var(--dim);margin-top:0.3rem}
  .h-count{font-size:0.82rem;margin-top:0.15rem}
  .h-count span{color:var(--coral)}

  /* ═══ CATEGORIES ═══ */
  .cats{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin-bottom:1.2rem;
    animation:chalkDraw .5s ease both;animation-delay:.1s}
  .cat{font-size:0.82rem;padding:0.25em 0.7em;border:1.5px solid rgba(240,237,230,0.15);border-radius:14px;
    cursor:pointer;transition:all .2s}
  .cat:hover,.cat.active{border-color:var(--chalk);background:rgba(240,237,230,0.06)}
  .cat.active{background:rgba(240,237,230,0.1)}

  /* ═══ RECIPE GRID ═══ */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem}
  .recipe{padding:0.8rem;border:1.5px solid rgba(240,237,230,0.06);border-radius:8px;
    transition:all .2s;cursor:default;position:relative;
    opacity:0;animation:wobbleIn .4s ease forwards}
  @keyframes wobbleIn{from{opacity:0;transform:rotate(-2deg) scale(0.92)}to{opacity:1;transform:rotate(0) scale(1)}}
  .recipe:hover{border-color:rgba(240,237,230,0.12);background:rgba(240,237,230,0.02)}

  .r-name{font-size:1rem;margin-bottom:0.15rem}
  .r-meta{font-size:0.72rem;color:var(--dim);display:flex;gap:0.4rem;align-items:center}
  .r-tag{font-size:0.65rem;padding:0.15em 0.4em;border-radius:8px;border:1px solid}

  .r-fav{position:absolute;top:0.6rem;right:0.6rem;font-size:0.9rem;cursor:pointer;transition:all .15s;opacity:0.3}
  .r-fav:hover{opacity:0.6}
  .r-fav.loved{opacity:1}
  @keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

  /* Chalk underline for grid section */
  .grid-label{font-family:'Permanent Marker',cursive;font-size:0.6rem;color:var(--dim);letter-spacing:0.15em;
    margin-bottom:0.5rem;position:relative;display:inline-block;opacity:0.4}
  .grid-label::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
    background:repeating-linear-gradient(90deg,var(--chalk) 0px,var(--chalk) 4px,transparent 4px,transparent 7px,var(--chalk) 7px,var(--chalk) 9px,transparent 9px,transparent 13px);
    opacity:0.2}

  /* ═══ ADD BUTTON ═══ */
  .add-btn{display:block;width:100%;text-align:center;padding:0.6em;border:1.5px dashed rgba(240,237,230,0.12);
    border-radius:8px;font-family:'ZCOOL KuaiLe',cursive;font-size:0.88rem;color:var(--dim);
    background:transparent;cursor:pointer;transition:all .2s;margin-bottom:1rem;
    animation:chalkDraw .5s ease both;animation-delay:.6s}
  .add-btn:hover{border-color:var(--teal);color:var(--teal)}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;animation:chalkDraw .5s ease both;animation-delay:.7s}
  .footer-motto{font-family:'Permanent Marker',cursive;font-size:0.82rem;color:var(--dim);opacity:0.25}
  .footer-disc{font-size:0.55rem;color:var(--dim);opacity:0.08;margin-top:0.2rem}

  @media(max-width:380px){.grid{grid-template-columns:1fr}.h-brand{font-size:1.8rem}}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="gf"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#gf)"/>
</svg>

<div class="page">

  <header class="header">
    <div class="h-brand chalk">灶神</div>
    <div class="h-en">HEARTH</div>
    <div class="h-sub chalk">我的菜谱本</div>
    <div class="h-count">收藏 <span id="favCount">4</span> 道</div>
  </header>

  <div class="cats">
    <span class="cat active">全部</span>
    <span class="cat">家常菜</span>
    <span class="cat">汤粥</span>
    <span class="cat">烘焙</span>
    <span class="cat">快手菜</span>
  </div>

  <div class="grid-label">RECIPES</div>

  <div class="grid">
    <div class="recipe" style="animation-delay:.2s">
      <div class="r-name chalk-coral">番茄炒蛋</div>
      <div class="r-meta"><span>10min</span><span class="r-tag" style="border-color:var(--coral);color:var(--coral)">家常菜</span></div>
      <div class="r-fav loved" style="color:var(--coral)" onclick="toggleFav(this)">♥</div>
    </div>
    <div class="recipe" style="animation-delay:.26s">
      <div class="r-name chalk-teal">排骨莲藕汤</div>
      <div class="r-meta"><span>90min</span><span class="r-tag" style="border-color:var(--teal);color:var(--teal)">汤粥</span></div>
      <div class="r-fav loved" style="color:var(--teal)" onclick="toggleFav(this)">♥</div>
    </div>
    <div class="recipe" style="animation-delay:.32s">
      <div class="r-name chalk-yellow">蒜蓉西兰花</div>
      <div class="r-meta"><span>15min</span><span class="r-tag" style="border-color:var(--yellow);color:var(--yellow)">快手菜</span></div>
      <div class="r-fav" style="color:var(--yellow)" onclick="toggleFav(this)">♡</div>
    </div>
    <div class="recipe" style="animation-delay:.38s">
      <div class="r-name chalk-coral">红烧肉</div>
      <div class="r-meta"><span>60min</span><span class="r-tag" style="border-color:var(--coral);color:var(--coral)">家常菜</span></div>
      <div class="r-fav loved" style="color:var(--coral)" onclick="toggleFav(this)">♥</div>
    </div>
    <div class="recipe" style="animation-delay:.44s">
      <div class="r-name chalk-teal">南瓜小米粥</div>
      <div class="r-meta"><span>40min</span><span class="r-tag" style="border-color:var(--teal);color:var(--teal)">汤粥</span></div>
      <div class="r-fav" style="color:var(--teal)" onclick="toggleFav(this)">♡</div>
    </div>
    <div class="recipe" style="animation-delay:.5s">
      <div class="r-name chalk-lilac">蔓越莓饼干</div>
      <div class="r-meta"><span>45min</span><span class="r-tag" style="border-color:var(--lilac);color:var(--lilac)">烘焙</span></div>
      <div class="r-fav loved" style="color:var(--lilac)" onclick="toggleFav(this)">♥</div>
    </div>
  </div>

  <button class="add-btn">+ 添加新菜谱</button>

  <footer class="footer">
    <div class="footer-motto">HEARTH · 用心做饭，认真吃饭</div>
    <div class="footer-disc">虚构应用 · 仅供展示</div>
  </footer>

</div>

<script>
var favCount=4;
function toggleFav(el){
  var isLoved=el.classList.contains('loved');
  if(isLoved){el.classList.remove('loved');el.textContent='♡';favCount--}
  else{el.classList.add('loved');el.textContent='♥';favCount++;
    el.style.animation='heartPop .25s ease';setTimeout(function(){el.style.animation=''},250)}
  document.getElementById('favCount').textContent=favCount;
}
// Category toggle
document.querySelectorAll('.cat').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('.cat').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
  });
});
</script>
<script src="nav.js"></script>
</body>
</html>
