<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本周家务排班 — 净界 CLEARZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--black:#0A0A0A;--gold:#E8C87A;--shadow:#1A1208;--flesh:#D4A574;--crimson:#6B1A1A;--dim:rgba(232,200,122,0.2)}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--black);color:var(--gold);font-family:'Noto Serif SC','Cormorant Garamond',serif;font-weight:300;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* Dramatic spotlight */
    background-image:
      radial-gradient(ellipse at 50% 15%,rgba(232,200,122,0.06) 0%,rgba(26,18,8,0.4) 35%,rgba(10,10,10,1) 75%),
      radial-gradient(ellipse at 30% 60%,rgba(212,165,116,0.02) 0%,transparent 40%),
      radial-gradient(ellipse at 70% 45%,rgba(232,200,122,0.015) 0%,transparent 35%)}

  .page{max-width:460px;width:100%;position:relative;z-index:1}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.5rem;opacity:0;animation:emerge 1.2s ease both}
  @keyframes emerge{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .h-brand{font-weight:600;font-size:1.4rem;color:var(--gold);letter-spacing:0.15em;
    text-shadow:0 0 12px rgba(232,200,122,0.2)}
  .h-en{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:0.72rem;
    color:rgba(232,200,122,0.3);letter-spacing:0.2em}
  .h-sub{font-size:0.88rem;color:rgba(232,200,122,0.4);margin-top:0.4rem}
  .h-week{font-family:'Cormorant Garamond',serif;font-size:0.78rem;color:rgba(232,200,122,0.2);margin-top:0.15rem}

  /* ═══ ROOMMATES ═══ */
  .mates{display:flex;justify-content:center;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap;
    opacity:0;animation:emerge 1s ease both;animation-delay:.3s}
  .mate{text-align:center}
  .mate-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:500;font-size:0.85rem;
    border:1.5px solid rgba(232,200,122,0.15);color:var(--flesh);margin:0 auto;
    transition:all .3s}
  .mate-circle:hover{border-color:var(--gold);text-shadow:0 0 8px rgba(232,200,122,0.3)}
  .mate-name{font-size:0.72rem;color:rgba(232,200,122,0.25);margin-top:0.2rem}

  /* ═══ CHORE GRID ═══ */
  .grid-wrap{opacity:0;animation:emerge 1s ease both;animation-delay:.5s;overflow-x:auto;margin-bottom:1.2rem}
  .grid{width:100%;border-collapse:collapse;font-size:0.82rem}
  .grid th{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:0.68rem;color:rgba(232,200,122,0.25);
    padding:0.4rem 0.3rem;text-align:center;letter-spacing:0.06em;border-bottom:1px solid rgba(232,200,122,0.04)}
  .grid td{padding:0.45rem 0.3rem;text-align:center;color:rgba(232,200,122,0.35);
    border-bottom:1px solid rgba(232,200,122,0.02);transition:all .3s;cursor:default}
  .grid td:first-child{text-align:left;color:var(--flesh);font-weight:400;font-size:0.85rem;padding-left:0.5rem}
  .grid td:hover{background:rgba(232,200,122,0.03);color:var(--gold);
    text-shadow:0 0 6px rgba(232,200,122,0.15)}

  /* Today column highlight */
  .grid th.today{color:var(--gold);text-shadow:0 0 8px rgba(232,200,122,0.25)}
  .grid td.today{color:var(--gold);background:rgba(232,200,122,0.03);
    text-shadow:0 0 6px rgba(232,200,122,0.2);
    box-shadow:inset 0 0 12px rgba(232,200,122,0.03)}
  .grid .today-border{border-left:1px solid rgba(232,200,122,0.06);border-right:1px solid rgba(232,200,122,0.06)}

  .grid td.free{color:rgba(232,200,122,0.15);font-style:italic}
  .grid td.all{color:var(--crimson);font-weight:400}

  /* ═══ SPECIAL ═══ */
  .special{border:1px solid rgba(232,200,122,0.06);border-radius:4px;padding:0.8rem 1rem;margin-bottom:1rem;
    opacity:0;animation:emerge 1s ease both;animation-delay:.8s}
  .sp-label{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:0.6rem;color:rgba(232,200,122,0.25);letter-spacing:0.12em;margin-bottom:0.3rem}
  .sp-text{font-size:0.88rem;color:rgba(232,200,122,0.4);line-height:1.8}
  .sp-text strong{color:var(--flesh);font-weight:400}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;opacity:0;animation:emerge 1s ease both;animation-delay:1s}
  .footer-motto{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.82rem;color:rgba(232,200,122,0.15)}
  .footer-disc{font-size:0.55rem;color:rgba(232,200,122,0.06);margin-top:0.2rem}

  @media(max-width:420px){.grid{font-size:0.75rem}.grid td{padding:0.35rem 0.2rem}.grid td:first-child{font-size:0.78rem}}
</style>
</head>
<body>

<div class="page">

  <header class="header">
    <div class="h-brand">净界</div>
    <div class="h-en">CLEARZONE</div>
    <div class="h-sub">本周家务排班</div>
    <div class="h-week">3.24 — 3.30</div>
  </header>

  <div class="mates">
    <div class="mate"><div class="mate-circle">L</div><div class="mate-name">小林</div></div>
    <div class="mate"><div class="mate-circle">J</div><div class="mate-name">阿杰</div></div>
    <div class="mate"><div class="mate-circle">X</div><div class="mate-name">晓晓</div></div>
    <div class="mate"><div class="mate-circle">W</div><div class="mate-name">大伟</div></div>
  </div>

  <div class="grid-wrap">
    <table class="grid">
      <thead>
        <tr>
          <th></th>
          <th>周一</th><th>周二</th><th class="today today-border">周三</th><th>周四</th><th>周五</th><th>周六</th><th>周日</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>做饭</td>
          <td>小林</td><td>大伟</td><td class="today today-border">晓晓</td><td>阿杰</td><td>小林</td><td class="free">自由</td><td class="all">全员</td>
        </tr>
        <tr>
          <td>洗碗</td>
          <td>阿杰</td><td>小林</td><td class="today today-border">大伟</td><td>晓晓</td><td>阿杰</td><td class="free">自由</td><td class="all">全员</td>
        </tr>
        <tr>
          <td>拖地</td>
          <td>晓晓</td><td>阿杰</td><td class="today today-border">小林</td><td>大伟</td><td>晓晓</td><td class="free">自由</td><td class="all">全员</td>
        </tr>
        <tr>
          <td>倒垃圾</td>
          <td>大伟</td><td>晓晓</td><td class="today today-border">阿杰</td><td>小林</td><td>大伟</td><td class="free">自由</td><td class="all">全员</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="special">
    <div class="sp-label">THIS WEEK SPECIAL</div>
    <div class="sp-text">周六聚餐：<strong>阿杰</strong>负责采购，<strong>晓晓</strong>负责甜点。其余两人负责餐后清洁。</div>
  </div>

  <footer class="footer">
    <div class="footer-motto">净界 · CLEARZONE · 干净的家，清净的心</div>
    <div class="footer-disc">虚构应用 · 仅供展示</div>
  </footer>

</div>

<script src="nav.js"></script>
</body>
</html>
