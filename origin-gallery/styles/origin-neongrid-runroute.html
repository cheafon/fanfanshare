<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑步路线分享 — 步频 CADENCE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#080810;--mag:#FF00FF;--cyan:#00FFFF;--green:#00FF66;--purple:#6600CC;--dim:#333}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--void);color:#E0E0E0;font-family:'Noto Sans SC','Orbitron',sans-serif;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}

  /* Perspective grid floor */
  .grid-floor{position:fixed;bottom:0;left:0;right:0;height:50vh;overflow:hidden;z-index:0;pointer-events:none}
  .grid-floor::after{content:'';position:absolute;inset:0;
    background:
      repeating-linear-gradient(90deg,rgba(102,0,204,0.12) 0px,rgba(102,0,204,0.12) 1px,transparent 1px,transparent 40px),
      repeating-linear-gradient(0deg,rgba(102,0,204,0.08) 0px,rgba(102,0,204,0.08) 1px,transparent 1px,transparent 40px);
    transform:perspective(500px) rotateX(60deg);transform-origin:bottom center}

  /* Scan line */
  .scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    box-shadow:0 0 8px var(--cyan),0 0 20px rgba(0,255,255,0.2);z-index:0;pointer-events:none;
    animation:scanDown 8s linear infinite}
  @keyframes scanDown{0%{top:-2px}100%{top:100%}}

  .page{max-width:440px;width:100%;position:relative;z-index:1}

  /* Neon glow helper */
  .neon-mag{color:var(--mag);text-shadow:0 0 5px var(--mag),0 0 10px var(--mag),0 0 20px var(--mag)}
  .neon-cyan{color:var(--cyan);text-shadow:0 0 5px var(--cyan),0 0 10px var(--cyan),0 0 20px var(--cyan)}
  .neon-green{color:var(--green);text-shadow:0 0 5px var(--green),0 0 10px var(--green)}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.2rem;animation:fadeIn .5s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .h-brand{font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:0.1em}
  .h-en{font-family:'Orbitron',sans-serif;font-weight:400;font-size:0.6rem;color:var(--dim);letter-spacing:0.3em}
  .h-type{font-size:0.82rem;color:rgba(224,224,224,0.3);margin-top:0.3rem}

  /* ═══ ROUTE VISUALIZATION ═══ */
  .route{height:80px;margin-bottom:1rem;position:relative;animation:fadeIn .5s ease both;animation-delay:.1s}
  .route-path{position:absolute;inset:0;display:flex;align-items:center}
  .route-seg{height:3px;flex:1;border-radius:2px;position:relative}
  .route-seg::after{content:'';position:absolute;inset:0;border-radius:2px;filter:blur(4px)}
  .rs1{background:var(--mag);box-shadow:0 0 6px var(--mag)}.rs1::after{background:var(--mag)}
  .rs2{background:var(--cyan);box-shadow:0 0 6px var(--cyan);transform:translateY(-8px)}.rs2::after{background:var(--cyan)}
  .rs3{background:var(--green);box-shadow:0 0 6px var(--green);transform:translateY(5px)}.rs3::after{background:var(--green)}
  .rs4{background:var(--mag);box-shadow:0 0 6px var(--mag);transform:translateY(-12px)}.rs4::after{background:var(--mag)}
  .rs5{background:var(--cyan);box-shadow:0 0 6px var(--cyan);transform:translateY(3px)}.rs5::after{background:var(--cyan)}
  .route-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:50%;transform:translateY(-50%)}
  .rd-start{left:0;background:var(--green);box-shadow:0 0 8px var(--green)}
  .rd-end{right:0;background:var(--mag);box-shadow:0 0 8px var(--mag)}

  /* ═══ STATS ═══ */
  .stats{display:flex;justify-content:center;gap:1.2rem;margin-bottom:1.2rem;flex-wrap:wrap;
    animation:fadeIn .5s ease both;animation-delay:.2s}
  .stat{text-align:center}
  .stat-num{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.8rem;line-height:1.1}
  .stat-label{font-size:0.7rem;color:rgba(224,224,224,0.25);margin-top:0.15rem}

  /* ═══ DETAILS ═══ */
  .details{border:1px solid rgba(102,0,204,0.15);padding:0.8rem 1rem;margin-bottom:1rem;
    box-shadow:0 0 8px rgba(102,0,204,0.05);
    animation:fadeIn .5s ease both;animation-delay:.4s}
  .d-row{display:flex;justify-content:space-between;padding:0.2rem 0;font-size:0.85rem;
    border-bottom:1px solid rgba(224,224,224,0.03)}
  .d-row:last-child{border:none}
  .d-key{color:rgba(224,224,224,0.3)}
  .d-val{color:rgba(224,224,224,0.6);font-family:'Orbitron',sans-serif;font-size:0.78rem}

  /* ═══ SPLITS ═══ */
  .splits{margin-bottom:1.2rem;animation:fadeIn .5s ease both;animation-delay:.5s}
  .sp-label{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:rgba(224,224,224,0.2);letter-spacing:0.15em;margin-bottom:0.4rem}
  .split{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.2rem}
  .sp-km{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:rgba(224,224,224,0.2);min-width:2.5em}
  .sp-bar-wrap{flex:1;height:4px;background:rgba(224,224,224,0.03);border-radius:2px;overflow:hidden}
  .sp-bar{height:100%;border-radius:2px;transition:width 1s ease}
  .sp-pace{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:rgba(224,224,224,0.3);min-width:3em;text-align:right}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;animation:fadeIn .5s ease both;animation-delay:.7s}
  .footer-motto{font-family:'Orbitron',sans-serif;font-size:0.68rem;color:var(--purple);opacity:0.4;letter-spacing:0.06em}
  .footer-disc{font-size:0.55rem;color:var(--dim);opacity:0.3;margin-top:0.2rem}

  @media(max-width:400px){body{padding:1rem}.stat-num{font-size:1.4rem}}
</style>
</head>
<body>

<div class="grid-floor"></div>
<div class="scan"></div>

<div class="page">

  <header class="header">
    <div class="h-brand neon-mag">步频</div>
    <div class="h-en">CADENCE</div>
    <div class="h-type">跑步路线分享</div>
  </header>

  <!-- ═══ ROUTE ═══ -->
  <div class="route">
    <div class="route-path">
      <div class="route-dot rd-start"></div>
      <div class="route-seg rs1" style="flex:1.2"></div>
      <div class="route-seg rs2" style="flex:1.5"></div>
      <div class="route-seg rs3" style="flex:1"></div>
      <div class="route-seg rs4" style="flex:1.8"></div>
      <div class="route-seg rs5" style="flex:1.3"></div>
      <div class="route-dot rd-end"></div>
    </div>
  </div>

  <!-- ═══ STATS ═══ -->
  <div class="stats">
    <div class="stat"><div class="stat-num neon-cyan" id="stDist">0</div><div class="stat-label">公里</div></div>
    <div class="stat"><div class="stat-num neon-green" id="stPace">0'00"</div><div class="stat-label">配速 /km</div></div>
    <div class="stat"><div class="stat-num neon-mag" id="stCal">0</div><div class="stat-label">千卡</div></div>
  </div>

  <!-- ═══ DETAILS ═══ -->
  <div class="details">
    <div class="d-row"><span class="d-key">日期</span><span class="d-val">2026.03.26</span></div>
    <div class="d-row"><span class="d-key">时间</span><span class="d-val">06:15 — 07:02</span></div>
    <div class="d-row"><span class="d-key">总时长</span><span class="d-val">46:58</span></div>
    <div class="d-row"><span class="d-key">路线</span><span class="d-val">世纪公园环线</span></div>
    <div class="d-row"><span class="d-key">心率</span><span class="d-val">156 BPM</span></div>
  </div>

  <!-- ═══ SPLITS ═══ -->
  <div class="splits">
    <div class="sp-label">SPLITS</div>
    <div id="splitBars"></div>
  </div>

  <footer class="footer">
    <div class="footer-motto">CADENCE · 用脚步丈量城市</div>
    <div class="footer-disc">虚构应用 · 仅供展示</div>
  </footer>

</div>

<script>
// Stat count-up
var dur=1500,start=performance.now();
function tick(now){
  var p=Math.min((now-start)/dur,1);
  var e=1-Math.pow(1-p,3);
  document.getElementById('stDist').textContent=(e*8.5).toFixed(1);
  var totalSec=Math.floor(e*332);var m=Math.floor(totalSec/60);var s=totalSec%60;
  document.getElementById('stPace').textContent=m+"'"+(s<10?'0':'')+s+'"';
  document.getElementById('stCal').textContent=Math.floor(e*520);
  if(p<1)requestAnimationFrame(tick);
  else{document.getElementById('stDist').textContent='8.5';document.getElementById('stPace').textContent="5'32\"";document.getElementById('stCal').textContent='520'}
}
setTimeout(function(){requestAnimationFrame(tick)},400);

// Splits
var splits=[
  {km:1,pace:"5'45\"",sec:345},{km:2,pace:"5'38\"",sec:338},{km:3,pace:"5'30\"",sec:330},
  {km:4,pace:"5'25\"",sec:325},{km:5,pace:"5'18\"",sec:318},{km:6,pace:"5'22\"",sec:322},
  {km:7,pace:"5'35\"",sec:335},{km:8,pace:"5'48\"",sec:348}
];
var minS=318,maxS=348;
var el=document.getElementById('splitBars');
var colors=['#FF00FF','#00FFFF','#00FF66','#FF00FF','#00FFFF','#00FF66','#FF00FF','#00FFFF'];
splits.forEach(function(s,i){
  var pct=((s.sec-minS)/(maxS-minS));// 0=fastest, 1=slowest
  var width=60+pct*40;// faster=wider
  width=100-pct*40;// faster=wider bar
  var div=document.createElement('div');
  div.className='split';
  div.innerHTML='<span class="sp-km">'+s.km+'km</span>'+
    '<div class="sp-bar-wrap"><div class="sp-bar" style="width:0%;background:'+colors[i]+';box-shadow:0 0 4px '+colors[i]+'"></div></div>'+
    '<span class="sp-pace">'+s.pace+'</span>';
  el.appendChild(div);
  // Animate bar
  setTimeout(function(){div.querySelector('.sp-bar').style.width=width+'%'},600+i*80);
});
</script>
<script src="nav.js"></script>
</body>
</html>
