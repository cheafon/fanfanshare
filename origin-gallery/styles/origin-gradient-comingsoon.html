<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾光 MOMENTO — 即将上线</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a2e;--purple:#7c3aed;--pink:#ec4899;--blue:#3b82f6;--orange:#f97316;--text:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:17px;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* Gradient mesh background */
  .mesh{position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(124,58,237,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 75% 20%, rgba(236,72,153,0.3) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 60% 80%, rgba(59,130,246,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 10% 80%, rgba(249,115,22,0.25) 0%, transparent 50%),
      var(--bg);
    background-size:200% 200%;
    animation:meshFlow 20s ease-in-out infinite}

  @keyframes meshFlow{
    0%{background-position:0% 0%}
    25%{background-position:50% 30%}
    50%{background-position:100% 50%}
    75%{background-position:30% 80%}
    100%{background-position:0% 0%}}

  /* Noise */
  .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}

  .main{position:relative;z-index:2;text-align:center;padding:2rem;max-width:640px;width:100%;
    animation:fadeUp 1s ease 0.3s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .tag{font-family:'Outfit',sans-serif;font-weight:500;font-size:0.75rem;letter-spacing:0.2em;color:rgba(255,255,255,0.5);
    border:1px solid rgba(255,255,255,0.12);display:inline-block;padding:0.4em 1.2em;border-radius:999px;margin-bottom:2rem}

  .brand-en{font-family:'Outfit',sans-serif;font-weight:800;font-size:clamp(2.5rem,7vw,4.5rem);letter-spacing:-0.02em;
    background:linear-gradient(135deg,var(--purple),var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
  .brand-cn{font-weight:700;font-size:1.6rem;color:rgba(255,255,255,0.7);margin-top:0.3rem;letter-spacing:0.1em}

  .desc{font-weight:300;font-size:1.1rem;color:rgba(255,255,255,0.45);margin-top:1.5rem;line-height:2;max-width:400px;display:inline-block}

  /* Countdown */
  .countdown{display:flex;justify-content:center;gap:1.5rem;margin-top:2rem;flex-wrap:wrap}
  .cd-unit{text-align:center}
  .cd-num{font-family:'Outfit',sans-serif;font-weight:700;font-size:2.5rem;line-height:1;
    background:linear-gradient(180deg,rgba(255,255,255,0.9),rgba(255,255,255,0.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .cd-label{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:0.3rem;letter-spacing:0.08em}

  /* Email form */
  .form{display:flex;gap:0;margin-top:2.5rem;max-width:420px;width:100%;margin-left:auto;margin-right:auto;border-radius:14px;overflow:hidden;
    border:1.5px solid rgba(255,255,255,0.1);transition:border-color 0.3s,box-shadow 0.3s}
  .form:focus-within{border-color:rgba(124,58,237,0.5);box-shadow:0 0 30px rgba(124,58,237,0.15)}

  .form input{flex:1;background:rgba(255,255,255,0.05);border:none;padding:0.9em 1.2em;font-family:inherit;font-size:0.95rem;color:#fff;outline:none}
  .form input::placeholder{color:rgba(255,255,255,0.25)}
  .form button{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:0.9em 1.8em;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.9rem;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
  .form button:hover{opacity:0.85}

  .waitlist{font-size:0.8rem;color:rgba(255,255,255,0.25);margin-top:0.8rem}

  /* Features */
  .features{display:flex;gap:1rem;margin-top:3rem;flex-wrap:wrap;justify-content:center}
  .feat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1rem 1.2rem;text-align:left;flex:1;min-width:160px;max-width:200px;
    transition:border-color 0.3s}
  .feat:hover{border-color:rgba(255,255,255,0.12)}
  .feat-icon{font-size:1.5rem;margin-bottom:0.5rem;display:block}
  .feat-title{font-weight:700;font-size:0.9rem;margin-bottom:0.2rem}
  .feat-desc{font-weight:300;font-size:0.8rem;color:rgba(255,255,255,0.35);line-height:1.7}

  /* Bottom */
  .bottom{position:relative;z-index:2;text-align:center;padding:3rem 2rem 2rem;animation:fadeUp 1s ease 0.8s both}
  .bottom-brand{font-family:'Outfit',sans-serif;font-weight:400;font-size:0.8rem;color:rgba(255,255,255,0.2);letter-spacing:0.08em}
  .bottom-social{display:flex;justify-content:center;gap:1rem;margin-top:0.8rem}
  .bottom-social a{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:0.55rem;font-weight:600;color:rgba(255,255,255,0.3);text-decoration:none;transition:all 0.2s}
  .bottom-social a:hover{border-color:var(--purple);color:var(--purple)}

  @media(max-width:500px){
    .countdown{gap:1rem}
    .cd-num{font-size:1.8rem}
    .features{flex-direction:column;align-items:center}
    .feat{max-width:100%;min-width:auto}
    .form{flex-direction:column;border-radius:12px}
    .form button{border-radius:0 0 12px 12px}
  }
</style>
</head>
<body>

<div class="mesh"></div>
<div class="noise"></div>

<div class="main">
  <div class="tag">即将上线 · COMING SOON</div>
  <h1 class="brand-en">MOMENTO</h1>
  <div class="brand-cn">拾光</div>
  <p class="desc">AI 帮你整理记忆，让每一刻都不被遗忘</p>

  <!-- Countdown -->
  <div class="countdown" id="cd">
    <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">天</div></div>
    <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">时</div></div>
    <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">分</div></div>
    <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">秒</div></div>
  </div>

  <!-- Email -->
  <div class="form">
    <input type="email" placeholder="输入你的邮箱地址">
    <button>抢先体验</button>
  </div>
  <div class="waitlist">已有 2,847 人加入等待名单</div>

  <!-- Features -->
  <div class="features">
    <div class="feat">
      <span class="feat-icon">🧠</span>
      <div class="feat-title">AI 记忆整理</div>
      <div class="feat-desc">自动归类你的照片、笔记和对话</div>
    </div>
    <div class="feat">
      <span class="feat-icon">⏳</span>
      <div class="feat-title">时间轴回忆</div>
      <div class="feat-desc">按时间线浏览你的人生故事</div>
    </div>
    <div class="feat">
      <span class="feat-icon">🔒</span>
      <div class="feat-title">端到端加密</div>
      <div class="feat-desc">你的记忆只属于你</div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="bottom-brand">拾光 MOMENTO · 记忆，值得被善待</div>
  <div class="bottom-social">
    <a href="#">Wx</a>
    <a href="#">Tw</a>
    <a href="#">Gh</a>
  </div>
</div>

<script>
// Countdown to 2026-06-01
function tick(){
  const target=new Date('2026-06-01T00:00:00').getTime();
  const now=Date.now();
  const diff=Math.max(0,target-now);
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
}
tick();setInterval(tick,1000);
</script>
<script src="nav.js"></script>
</body>
</html>
