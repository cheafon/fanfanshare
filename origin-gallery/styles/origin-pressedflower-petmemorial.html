<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永远的豆沙 · 2014–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F5EDE0;--rose:#C4858A;--green:#7A9E7E;--lavender:#9B8BB4;--gold:#BFA87A;--brown:#8B7355;--warm:#FBF8F3;--dim:rgba(139,115,85,0.3)}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--paper);color:var(--brown);font-family:'Noto Serif SC','Sorts Mill Goudy',serif;font-weight:300;font-size:17px;line-height:1.9;
    display:flex;justify-content:center;padding:2rem 1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative;
    background-image:
      radial-gradient(ellipse at 50% 30%,rgba(191,168,122,0.04) 0%,transparent 60%),
      radial-gradient(ellipse at 20% 80%,rgba(196,133,138,0.03) 0%,transparent 50%)}

  /* Grain */
  .grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.02}

  /* ═══ PRESSED FLOWERS — fixed decorative specimens ═══ */
  .flora{position:fixed;pointer-events:none;z-index:0}
  /* Petal shapes via organic border-radius */
  .petal{position:absolute;opacity:0.07}
  /* Flower 1 — top right, dried rose */
  .f1{top:8%;right:8%}.f1 .petal:nth-child(1){width:28px;height:40px;background:var(--rose);border-radius:80% 20% 70% 30%/50% 60% 40% 50%;transform:rotate(-15deg)}
  .f1 .petal:nth-child(2){width:24px;height:36px;background:var(--rose);border-radius:70% 30% 80% 20%/40% 50% 50% 60%;transform:rotate(45deg);top:-8px;left:14px;position:absolute;opacity:0.05}
  .f1 .petal:nth-child(3){width:20px;height:30px;background:var(--rose);border-radius:60% 40% 70% 30%/50% 40% 60% 50%;transform:rotate(110deg);top:4px;left:22px;position:absolute;opacity:0.06}
  /* Flower 2 — left side, lavender */
  .f2{top:35%;left:5%}.f2 .petal:nth-child(1){width:22px;height:34px;background:var(--lavender);border-radius:75% 25% 65% 35%/55% 45% 55% 45%;transform:rotate(20deg)}
  .f2 .petal:nth-child(2){width:18px;height:28px;background:var(--lavender);border-radius:65% 35% 75% 25%/45% 55% 45% 55%;transform:rotate(80deg);top:-6px;left:12px;position:absolute;opacity:0.05}
  /* Leaf 1 — bottom left, green */
  .l1{bottom:20%;left:10%;width:35px;height:14px;background:var(--green);opacity:0.08;
    clip-path:ellipse(50% 45% at 50% 50%);transform:rotate(-30deg)}
  /* Leaf 2 — right, green */
  .l2{top:60%;right:6%;width:28px;height:11px;background:var(--green);opacity:0.06;
    clip-path:ellipse(50% 42% at 50% 50%);transform:rotate(25deg)}
  /* Flower 3 — bottom right, rose faded */
  .f3{bottom:10%;right:12%}.f3 .petal:nth-child(1){width:20px;height:30px;background:var(--rose);border-radius:70% 30% 60% 40%/50% 40% 60% 50%;transform:rotate(-40deg);opacity:0.05}
  .f3 .petal:nth-child(2){width:16px;height:26px;background:var(--rose);border-radius:80% 20% 70% 30%/60% 50% 50% 40%;transform:rotate(30deg);top:2px;left:14px;position:absolute;opacity:0.04}

  .page{max-width:440px;width:100%;position:relative;z-index:1;
    border:1px solid rgba(196,133,138,0.12);padding:2rem 1.5rem;
    box-shadow:inset 0 0 0 3px var(--paper),inset 0 0 0 4px rgba(196,133,138,0.08)}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:2rem;opacity:0;animation:gentleFade .9s ease both;animation-delay:.2s}
  @keyframes gentleFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .h-title{font-weight:600;font-size:1.4rem;color:var(--brown);letter-spacing:0.12em}
  .h-dates{font-family:'Sorts Mill Goudy',serif;font-style:italic;font-size:0.85rem;color:var(--dim);margin-top:0.3rem;letter-spacing:0.06em}

  /* ═══ MEMORIAL CIRCLE ═══ */
  .circle-wrap{text-align:center;margin-bottom:1.8rem;opacity:0;animation:gentleFade .9s ease both;animation-delay:.5s}
  .circle{width:100px;height:100px;border-radius:50%;margin:0 auto;position:relative;
    border:1.5px solid rgba(196,133,138,0.25);display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 5px var(--paper),0 0 0 6px rgba(196,133,138,0.1)}
  .circle-char{font-weight:600;font-size:1.8rem;color:var(--rose);opacity:0.6}
  /* Tiny petals around circle */
  .circle-petal{position:absolute;width:10px;height:16px;background:var(--rose);opacity:0.08;
    border-radius:70% 30% 60% 40%/50% 50% 50% 50%}
  .cp1{top:-10px;left:42px;transform:rotate(-10deg)}
  .cp2{top:10px;right:-8px;transform:rotate(70deg)}
  .cp3{bottom:-8px;left:38px;transform:rotate(170deg)}
  .cp4{top:15px;left:-8px;transform:rotate(-80deg)}

  /* ═══ TRIBUTE ═══ */
  .tribute{text-align:center;margin-bottom:2rem;opacity:0;animation:gentleFade .9s ease both;animation-delay:.8s}
  .tribute-text{font-size:1rem;color:rgba(139,115,85,0.55);line-height:2;font-style:italic}

  /* ═══ STATS ═══ */
  .stats{display:flex;justify-content:center;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap;
    opacity:0;animation:gentleFade .9s ease both;animation-delay:1s}
  .stat{text-align:center}
  .stat-num{font-family:'Sorts Mill Goudy',serif;font-size:1.4rem;color:var(--brown)}
  .stat-label{font-size:0.75rem;color:var(--dim);margin-top:0.1rem}

  /* ═══ MEMORIES ═══ */
  .memories{margin-bottom:2rem}
  .memory{padding:0.8rem 0;border-bottom:1px solid rgba(196,133,138,0.06);
    opacity:0;animation:gentleFade .9s ease forwards;transition:all .3s}
  .memory:last-child{border:none}
  .memory:hover{background:rgba(191,168,122,0.03);padding-left:0.3rem}
  .mem-title{font-weight:400;font-size:0.88rem;color:var(--rose);letter-spacing:0.04em}
  .mem-text{font-weight:300;font-size:0.92rem;color:rgba(139,115,85,0.5);margin-top:0.15rem;line-height:1.9}

  /* ═══ FINAL ═══ */
  .final{text-align:center;margin-bottom:1.5rem;opacity:0;animation:gentleFade .9s ease both;animation-delay:2s}
  .final-text{font-weight:400;font-size:1.05rem;color:var(--brown);line-height:2.2}
  .final-line{width:30px;height:1px;background:var(--rose);opacity:0.25;margin:0.8rem auto 0}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;opacity:0;animation:gentleFade .9s ease both;animation-delay:2.3s}
  .footer-text{font-family:'Sorts Mill Goudy',serif;font-style:italic;font-size:0.8rem;color:var(--dim);opacity:0.4}
  .footer-disc{font-size:0.55rem;color:var(--dim);opacity:0.12;margin-top:0.3rem}

  @media(max-width:400px){body{padding:1.5rem 1rem}.page{padding:1.5rem 1rem}.stats{gap:1rem}}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="gf"><feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="4" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#gf)"/>
</svg>

<!-- Pressed flower specimens -->
<div class="flora f1"><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>
<div class="flora f2"><div class="petal"></div><div class="petal"></div></div>
<div class="flora l1"></div>
<div class="flora l2"></div>
<div class="flora f3"><div class="petal"></div><div class="petal"></div></div>

<div class="page">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="h-title">永远的豆沙</div>
    <div class="h-dates">2014.06.12 — 2026.02.08</div>
  </header>

  <!-- ═══ MEMORIAL CIRCLE ═══ -->
  <div class="circle-wrap">
    <div class="circle">
      <div class="circle-char">豆</div>
      <div class="circle-petal cp1"></div>
      <div class="circle-petal cp2"></div>
      <div class="circle-petal cp3"></div>
      <div class="circle-petal cp4"></div>
    </div>
  </div>

  <!-- ═══ TRIBUTE ═══ -->
  <div class="tribute">
    <p class="tribute-text">你来过这个世界，<br>留下了满屋子的毛和永远填不满的猫粮碗。</p>
  </div>

  <!-- ═══ STATS ═══ -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statDays">0</div>
      <div class="stat-label">天的陪伴</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statCans">0</div>
      <div class="stat-label">罐猫粮</div>
    </div>
    <div class="stat">
      <div class="stat-num">countless</div>
      <div class="stat-label">杯被打翻的水</div>
    </div>
  </div>

  <!-- ═══ MEMORIES ═══ -->
  <div class="memories">
    <div class="memory" style="animation-delay:1.3s">
      <div class="mem-title">第一次回家</div>
      <div class="mem-text">2014 年夏天，你缩在纸箱角落，眼睛比身体还大。我伸出手，你犹豫了一下，然后蹭了过来。</div>
    </div>
    <div class="memory" style="animation-delay:1.5s">
      <div class="mem-title">最爱的位置</div>
      <div class="mem-text">永远是键盘上。你觉得那是你的床。每次我推开你，你就更大力地趴回来。</div>
    </div>
    <div class="memory" style="animation-delay:1.7s">
      <div class="mem-title">最后的下午</div>
      <div class="mem-text">阳光照在你最喜欢的窗台，你闭上眼睛，很安详。窗外的鸟还在叫，好像什么都没有变。</div>
    </div>
  </div>

  <!-- ═══ FINAL ═══ -->
  <div class="final">
    <p class="final-text">谢谢你选择了我们。<br>下辈子还做我的猫好不好。</p>
    <div class="final-line"></div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-text">豆沙 · 2014–2026 · 永远的小朋友</div>
    <div class="footer-disc">虚构纪念 · 仅供展示</div>
  </footer>

</div>

<script>
// Gentle memorial count-up
function countUp(el,target,duration){
  var start=performance.now();
  function tick(now){
    var elapsed=now-start;
    var progress=Math.min(elapsed/duration,1);
    // Gentle ease-out
    var eased=1-Math.pow(1-progress,2.5);
    el.textContent=Math.floor(eased*target).toLocaleString();
    if(progress<1)requestAnimationFrame(tick);
    else el.textContent=target.toLocaleString();
  }
  requestAnimationFrame(tick);
}
// Start counters after a respectful delay
setTimeout(function(){
  countUp(document.getElementById('statDays'),4382,2500);
  countUp(document.getElementById('statCans'),2190,2500);
},1200);
</script>
<script src="nav.js"></script>
</body>
</html>
