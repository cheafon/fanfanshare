<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>锁匠 LOCKSMITH — 安全密码生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--green:#00ff41;--dkgreen:#003b00;--gray:#1a1a1a;--bright:#39ff14;--red:#ff2040;--blue:#4090ff;--dim:rgba(0,255,65,0.25)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--green);font-family:'Fira Code','Noto Sans SC',monospace;font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}

  canvas{position:fixed;inset:0;z-index:0}

  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:2rem 1.5rem}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:2rem}
  .h-title{font-size:1.6rem;font-weight:700;color:var(--bright);letter-spacing:0.1em;text-shadow:0 0 10px rgba(0,255,65,0.3)}
  .h-en{font-size:0.7rem;color:var(--dim);letter-spacing:0.15em;margin-top:0.2rem}
  .h-prompt{font-size:0.85rem;color:rgba(0,255,65,0.4);margin-top:0.8rem}
  .h-prompt .cursor{display:inline-block;width:8px;height:1.1em;background:var(--green);margin-left:2px;animation:cursorBlink 1s steps(1) infinite;vertical-align:text-bottom}
  @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

  /* ═══ PASSWORD DISPLAY ═══ */
  .pwd-box{border:1px solid var(--dkgreen);background:rgba(0,20,0,0.5);padding:1.2rem;margin-bottom:1rem;position:relative;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .pwd-label{font-size:0.6rem;color:var(--dim);letter-spacing:0.1em;margin-bottom:0.5rem}
  .pwd-display{font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:600;color:var(--bright);word-break:break-all;min-height:1.6em;
    text-shadow:0 0 8px rgba(0,255,65,0.2);letter-spacing:0.05em;transition:opacity .15s}

  .pwd-actions{display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem}
  .copy-btn{font-family:inherit;font-size:0.78rem;color:var(--green);background:none;border:1px solid var(--dkgreen);
    padding:0.35em 0.8em;cursor:pointer;transition:all .15s;letter-spacing:0.05em}
  .copy-btn:hover{border-color:var(--green);box-shadow:0 0 8px rgba(0,255,65,0.15)}
  .copy-btn.copied{color:var(--black);background:var(--green);border-color:var(--green)}

  /* Strength bar */
  .strength{flex:1;margin-left:1rem}
  .str-label{font-size:0.6rem;color:var(--dim);letter-spacing:0.05em;text-align:right}
  .str-track{height:4px;background:rgba(0,255,65,0.06);margin-top:3px;overflow:hidden}
  .str-fill{height:100%;width:0;transition:width .4s,background .4s}

  /* ═══ CONTROLS ═══ */
  .controls{border:1px solid rgba(0,60,0,0.3);background:rgba(0,10,0,0.4);padding:1rem;margin-bottom:1rem;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .ctrl-label{font-size:0.6rem;color:var(--dim);letter-spacing:0.08em;margin-bottom:0.4rem}

  /* Slider */
  .slider-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem}
  .slider-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--dkgreen);border-radius:2px;outline:none}
  .slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer;
    box-shadow:0 0 8px rgba(0,255,65,0.3)}
  .len-display{font-size:1.1rem;font-weight:700;color:var(--bright);min-width:2ch;text-align:right}

  /* Checkboxes */
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
  .check{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;color:rgba(0,255,65,0.5);cursor:pointer;padding:0.3rem 0;user-select:none}
  .check input{display:none}
  .check-box{width:16px;height:16px;border:1.5px solid var(--dkgreen);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--green);flex-shrink:0;transition:all .15s}
  .check input:checked~.check-box{border-color:var(--green);background:rgba(0,255,65,0.1)}
  .check input:checked~.check-box::after{content:'✓'}
  .check input:checked~.check-text{color:var(--green)}
  .check-text{transition:color .15s}

  /* ═══ GENERATE BTN ═══ */
  .gen-btn{display:block;width:100%;font-family:inherit;font-size:1rem;font-weight:600;color:var(--black);background:var(--green);
    border:none;padding:0.8em;cursor:pointer;letter-spacing:0.1em;transition:all .15s;
    box-shadow:0 0 15px rgba(0,255,65,0.2)}
  .gen-btn:hover{box-shadow:0 0 25px rgba(0,255,65,0.35);text-shadow:none}
  .gen-btn:active{transform:scale(0.98)}

  /* Flash overlay */
  .flash{position:fixed;inset:0;background:var(--green);z-index:100;opacity:0;pointer-events:none;transition:opacity .05s}
  .flash.active{opacity:0.06}

  /* ═══ TIPS ═══ */
  .tips{margin-top:1rem;padding:0.8rem;border-left:2px solid rgba(0,60,0,0.3)}
  .tip{font-size:0.8rem;color:rgba(0,255,65,0.2);line-height:2}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;margin-top:1.5rem}
  .footer-ver{font-size:0.7rem;color:rgba(0,255,65,0.15);letter-spacing:0.05em}
  .footer-disc{font-size:0.6rem;color:rgba(0,255,65,0.08);margin-top:0.2rem}

  @media(max-width:400px){
    .app{padding:1.5rem 1rem}
    .checks{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>
<div class="flash" id="flash"></div>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="h-title">锁匠</div>
    <div class="h-en">LOCKSMITH · 安全密码生成器</div>
    <div class="h-prompt">&gt; 生成你的下一个不可破解的密码<span class="cursor"></span></div>
  </header>

  <!-- ═══ PASSWORD DISPLAY ═══ -->
  <div class="pwd-box">
    <div class="pwd-label">GENERATED PASSWORD</div>
    <div class="pwd-display" id="pwdDisplay">等待生成...</div>
    <div class="pwd-actions">
      <button class="copy-btn" id="copyBtn" onclick="copyPwd()">[ 复制 ]</button>
      <div class="strength">
        <div class="str-label" id="strLabel">--</div>
        <div class="str-track"><div class="str-fill" id="strFill"></div></div>
      </div>
    </div>
  </div>

  <!-- ═══ CONTROLS ═══ -->
  <div class="controls">
    <div class="ctrl-label">PASSWORD LENGTH · 密码长度</div>
    <div class="slider-row">
      <input type="range" id="lenSlider" min="8" max="32" value="16" oninput="updateLen()">
      <span class="len-display" id="lenNum">16</span>
    </div>

    <div class="ctrl-label">CHARACTER TYPES · 字符类型</div>
    <div class="checks">
      <label class="check"><input type="checkbox" id="chkUpper" checked onchange="generate()"><span class="check-box"></span><span class="check-text">大写 A-Z</span></label>
      <label class="check"><input type="checkbox" id="chkLower" checked onchange="generate()"><span class="check-box"></span><span class="check-text">小写 a-z</span></label>
      <label class="check"><input type="checkbox" id="chkNum" checked onchange="generate()"><span class="check-box"></span><span class="check-text">数字 0-9</span></label>
      <label class="check"><input type="checkbox" id="chkSym" checked onchange="generate()"><span class="check-box"></span><span class="check-text">符号 !@#$%</span></label>
    </div>
  </div>

  <!-- ═══ GENERATE ═══ -->
  <button class="gen-btn" onclick="flashScreen();generate()">[ 生成密码 ]</button>

  <!-- ═══ TIPS ═══ -->
  <div class="tips">
    <div class="tip">&gt; 永远不要重复使用密码</div>
    <div class="tip">&gt; 16位 + 混合字符 = 几乎不可能暴力破解</div>
    <div class="tip">&gt; 建议配合密码管理器使用</div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-ver">LOCKSMITH v1.0 · 本地生成，不上传任何数据</div>
    <div class="footer-disc">虚构工具 · 仅供展示</div>
  </footer>

</div>

<script>
// ═══ MATRIX RAIN ═══
(function(){
  var c=document.getElementById('rain'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  var chars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
  var fontSize=14,columns=Math.floor(c.width/fontSize);
  var drops=[];for(var i=0;i<columns;i++)drops[i]=Math.random()*-100;
  function draw(){
    ctx.fillStyle='rgba(10,10,10,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00ff41';ctx.font=fontSize+'px monospace';
    for(var i=0;i<drops.length;i++){
      var ch=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillStyle='rgba(0,255,65,'+(0.3+Math.random()*0.5)+')';
      ctx.fillText(ch,i*fontSize,drops[i]*fontSize);
      if(drops[i]*fontSize>c.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=0.5+Math.random()*0.5;
    }
  }
  setInterval(draw,50);
})();

// ═══ PASSWORD GENERATOR ═══
var display=document.getElementById('pwdDisplay');
var strLabel=document.getElementById('strLabel');
var strFill=document.getElementById('strFill');

function updateLen(){
  document.getElementById('lenNum').textContent=document.getElementById('lenSlider').value;
}

function generate(){
  var len=parseInt(document.getElementById('lenSlider').value);
  var pool='';
  if(document.getElementById('chkUpper').checked)pool+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('chkLower').checked)pool+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('chkNum').checked)pool+='0123456789';
  if(document.getElementById('chkSym').checked)pool+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!pool){pool='abcdefghijklmnopqrstuvwxyz';document.getElementById('chkLower').checked=true}

  var pwd='';
  for(var i=0;i<len;i++)pwd+=pool[Math.floor(Math.random()*pool.length)];

  // Typewriter effect
  display.textContent='';
  var idx=0;
  function typeChar(){
    if(idx<pwd.length){display.textContent+=pwd[idx];idx++;setTimeout(typeChar,30)}
  }
  typeChar();

  // Strength
  var types=0;
  if(/[A-Z]/.test(pwd))types++;
  if(/[a-z]/.test(pwd))types++;
  if(/[0-9]/.test(pwd))types++;
  if(/[^A-Za-z0-9]/.test(pwd))types++;
  var score=0;
  if(len>=8)score++;if(len>=12)score++;if(len>=16)score++;if(len>=20)score++;
  score+=types;
  var lvl,color,width;
  if(score<=3){lvl='弱';color='var(--red)';width='25%'}
  else if(score<=5){lvl='中';color='#f0a030';width='50%'}
  else if(score<=7){lvl='强';color='var(--green)';width='75%'}
  else{lvl='极强';color='var(--blue)';width='100%'}
  strLabel.textContent=lvl;strLabel.style.color=color;
  strFill.style.width=width;strFill.style.background=color;
}

function flashScreen(){
  var f=document.getElementById('flash');
  f.classList.add('active');
  setTimeout(function(){f.classList.remove('active')},80);
}

function copyPwd(){
  var text=display.textContent;
  if(!text||text==='等待生成...')return;
  var btn=document.getElementById('copyBtn');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  }else{fallback()}
  function fallback(){
    var ta=document.createElement('textarea');ta.value=text;
    ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);done();
  }
  function done(){
    btn.textContent='[ 已复制 ✓ ]';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='[ 复制 ]';btn.classList.remove('copied')},1500);
  }
}

// Initial generation
generate();
</script>
<script src="nav.js"></script>
</body>
</html>
