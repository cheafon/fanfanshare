<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据星球 DATA PLANET — 今日运营概览</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080818;--blue:#00a8ff;--cyan:#00e8c8;--purple:#a050ff;--ice:#e0f0ff;--panel:rgba(0,80,160,0.06);--orange:#ff8040;--dim:rgba(224,240,255,0.25);--glass-border:rgba(0,168,255,0.08)}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--bg);color:var(--ice);font-family:'Noto Sans SC',sans-serif;font-size:17px;line-height:1.7;padding:1.5rem;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;min-height:100vh}

  /* Frost particles container */
  .frost-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .frost-dot{position:absolute;border-radius:50%;background:var(--blue);opacity:0.15;animation:frostFloat var(--fd) ease-in-out infinite var(--fdd)}
  @keyframes frostFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(var(--fx),var(--fy))}50%{transform:translate(calc(var(--fx)*-0.5),calc(var(--fy)*1.5))}75%{transform:translate(calc(var(--fx)*0.8),calc(var(--fy)*-0.5))}}

  .dash{max-width:600px;margin:0 auto;position:relative;z-index:1}

  /* Glass panel */
  .gpanel{background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:1.2rem;margin-bottom:0.8rem}

  /* Staggered entrance */
  .si{opacity:0;transform:translateY(12px);animation:slideIn .5s ease forwards}
  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}

  /* ═══ HEADER ═══ */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.3rem;animation-delay:0s}
  .header-brand{font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.85rem;color:var(--blue);letter-spacing:0.12em}
  .header-date{font-size:0.85rem;color:var(--dim)}
  .header-live{display:flex;align-items:center;gap:0.4rem;font-family:'Exo 2',sans-serif;font-size:0.65rem;color:var(--cyan);letter-spacing:0.08em}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:blink 1.5s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

  /* ═══ KPI CARDS ═══ */
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:0.8rem}
  .kpi{text-align:center}
  .kpi-num{font-family:'Exo 2',sans-serif;font-weight:700;font-size:clamp(1.6rem,5vw,2rem);color:var(--ice);line-height:1.2}
  .kpi-label{font-size:0.8rem;color:var(--dim);margin-top:0.2rem}
  .kpi-change{font-family:'Exo 2',sans-serif;font-size:0.7rem;margin-top:0.1rem}
  .change-up{color:var(--cyan)}
  .change-down{color:var(--orange)}

  /* ═══ RING GAUGES ═══ */
  .gauges{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:0.8rem}
  .gauge{text-align:center;padding:1.2rem 0.8rem}
  .gauge-ring{width:100px;height:100px;border-radius:50%;margin:0 auto;position:relative;
    background:conic-gradient(var(--gauge-color,var(--blue)) 0deg,var(--gauge-color,var(--blue)) var(--gauge-deg,0deg),rgba(0,168,255,0.08) var(--gauge-deg,0deg),rgba(0,168,255,0.08) 360deg);
    display:flex;align-items:center;justify-content:center;
    animation:ringGrow 1.5s ease-out forwards;--gauge-deg:0deg}
  .gauge-inner{width:76px;height:76px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge-pct{font-family:'Exo 2',sans-serif;font-weight:700;font-size:1.4rem;color:var(--ice)}
  .gauge-title{font-size:0.8rem;color:var(--dim);margin-top:0.4rem}

  /* ═══ SVG CHART ═══ */
  .chart-card{padding:1.2rem}
  .chart-title{font-family:'Exo 2',sans-serif;font-size:0.65rem;color:var(--dim);letter-spacing:0.1em;margin-bottom:0.8rem}
  .chart-svg{width:100%;height:120px}
  .chart-line{fill:none;stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine 2s ease forwards 0.5s}
  .chart-area{fill:url(#areaGrad);opacity:0;animation:areaFade 1s ease forwards 1.5s}
  @keyframes drawLine{to{stroke-dashoffset:0}}
  @keyframes areaFade{to{opacity:0.15}}
  .chart-dots circle{fill:var(--blue);opacity:0;animation:dotPop .3s ease forwards}
  .chart-labels{display:flex;justify-content:space-between;margin-top:0.4rem}
  .chart-label{font-family:'Exo 2',sans-serif;font-size:0.55rem;color:rgba(224,240,255,0.2)}

  /* ═══ TOP PRODUCTS ═══ */
  .top-title{font-family:'Exo 2',sans-serif;font-size:0.65rem;color:var(--dim);letter-spacing:0.1em;margin-bottom:0.6rem}
  .top-row{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid rgba(0,168,255,0.04)}
  .top-row:last-child{border-bottom:none}
  .top-rank{font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.85rem;width:24px;text-align:center}
  .rank-1{color:var(--cyan)}
  .rank-2{color:var(--blue)}
  .rank-3{color:var(--purple)}
  .top-name{flex:1;font-size:0.9rem;color:rgba(224,240,255,0.5)}
  .top-data{font-family:'Exo 2',sans-serif;font-size:0.8rem;color:var(--ice);text-align:right}
  .top-units{font-size:0.7rem;color:var(--dim)}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;padding:1rem 0 0.5rem}
  .footer-text{font-family:'Exo 2',sans-serif;font-size:0.7rem;color:var(--dim);letter-spacing:0.08em;opacity:0.3}
  .footer-disc{font-size:0.6rem;color:var(--dim);opacity:0.1;margin-top:0.2rem}

  @media(max-width:500px){
    body{padding:0.8rem}
    .kpis,.gauges{grid-template-columns:1fr 1fr}
    .gauge-ring{width:80px;height:80px}
    .gauge-inner{width:60px;height:60px}
    .gauge-pct{font-size:1.1rem}
  }
</style>
</head>
<body>

<div class="frost-particles" id="frostBox"></div>

<div class="dash">

  <!-- ═══ HEADER ═══ -->
  <div class="header si" style="animation-delay:0s">
    <div>
      <div class="header-brand">DATA PLANET · 数据星球</div>
      <div class="header-date">今日运营概览 · 2026.03.25</div>
    </div>
    <div class="header-live"><span class="live-dot"></span>LIVE</div>
  </div>

  <!-- ═══ KPI CARDS ═══ -->
  <div class="kpis">
    <div class="gpanel kpi si" style="animation-delay:0.1s">
      <div class="kpi-num" data-target="128450" data-prefix="¥" data-comma>0</div>
      <div class="kpi-label">今日营收</div>
      <div class="kpi-change change-up">↑ 23.5%</div>
    </div>
    <div class="gpanel kpi si" style="animation-delay:0.2s">
      <div class="kpi-num" data-target="847" data-suffix=" 单" data-comma>0</div>
      <div class="kpi-label">订单数</div>
      <div class="kpi-change change-up">↑ 12.8%</div>
    </div>
    <div class="gpanel kpi si" style="animation-delay:0.3s">
      <div class="kpi-num" data-target="23892" data-suffix=" 人" data-comma>0</div>
      <div class="kpi-label">访客数</div>
      <div class="kpi-change change-down">↓ 3.2%</div>
    </div>
    <div class="gpanel kpi si" style="animation-delay:0.4s">
      <div class="kpi-num" data-target="354" data-decimal="2" data-suffix="%">0</div>
      <div class="kpi-label">转化率</div>
      <div class="kpi-change change-up">↑ 0.8%</div>
    </div>
  </div>

  <!-- ═══ RING GAUGES ═══ -->
  <div class="gauges">
    <div class="gpanel gauge si" style="animation-delay:0.5s">
      <div class="gauge-ring" id="gauge1" style="--gauge-color:var(--blue)">
        <div class="gauge-inner"><span class="gauge-pct">72%</span></div>
      </div>
      <div class="gauge-title">目标完成度</div>
    </div>
    <div class="gpanel gauge si" style="animation-delay:0.6s">
      <div class="gauge-ring" id="gauge2" style="--gauge-color:var(--cyan)">
        <div class="gauge-inner"><span class="gauge-pct">94%</span></div>
      </div>
      <div class="gauge-title">客户满意度</div>
    </div>
  </div>

  <!-- ═══ SVG CHART ═══ -->
  <div class="gpanel chart-card si" style="animation-delay:0.7s">
    <div class="chart-title">7 DAY REVENUE TREND · 七日营收趋势</div>
    <svg class="chart-svg" viewBox="0 0 500 120" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--blue)"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
      <!-- Grid lines -->
      <line x1="0" y1="30" x2="500" y2="30" stroke="rgba(0,168,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="60" x2="500" y2="60" stroke="rgba(0,168,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="90" x2="500" y2="90" stroke="rgba(0,168,255,0.04)" stroke-width="1"/>
      <!-- Area -->
      <polygon class="chart-area" points="35,68 118,48 201,72 284,40 367,24 450,12 450,110 35,110"/>
      <!-- Line -->
      <polyline class="chart-line" points="35,68 118,48 201,72 284,40 367,24 450,12"/>
      <!-- Dots -->
      <g class="chart-dots">
        <circle cx="35" cy="68" r="3.5" style="animation-delay:1.2s"/>
        <circle cx="118" cy="48" r="3.5" style="animation-delay:1.35s"/>
        <circle cx="201" cy="72" r="3.5" style="animation-delay:1.5s"/>
        <circle cx="284" cy="40" r="3.5" style="animation-delay:1.65s"/>
        <circle cx="367" cy="24" r="3.5" style="animation-delay:1.8s"/>
        <circle cx="450" cy="12" r="3.5" style="animation-delay:1.95s"/>
      </g>
    </svg>
    <div class="chart-labels">
      <span class="chart-label">MON</span><span class="chart-label">TUE</span><span class="chart-label">WED</span><span class="chart-label">THU</span><span class="chart-label">FRI</span><span class="chart-label">SAT</span>
    </div>
  </div>

  <!-- ═══ TOP PRODUCTS ═══ -->
  <div class="gpanel si" style="animation-delay:0.9s">
    <div class="top-title">TOP PRODUCTS · 热销排行</div>
    <div class="top-row"><span class="top-rank rank-1">#1</span><span class="top-name">无线降噪耳机</span><div><div class="top-data">¥32,800</div><div class="top-units">142 单</div></div></div>
    <div class="top-row"><span class="top-rank rank-2">#2</span><span class="top-name">智能手表 Pro</span><div><div class="top-data">¥28,500</div><div class="top-units">95 单</div></div></div>
    <div class="top-row"><span class="top-rank rank-3">#3</span><span class="top-name">便携投影仪</span><div><div class="top-data">¥21,200</div><div class="top-units">78 单</div></div></div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer si" style="animation-delay:1s">
    <div class="footer-text">DATA PLANET · 数据驱动决策</div>
    <div class="footer-disc">虚构产品 · 仅供展示</div>
  </footer>

</div>

<script>
// Frost particles
(function(){
  var box=document.getElementById('frostBox');
  var colors=['#00a8ff','#00e8c8','#a050ff'];
  for(var i=0;i<22;i++){
    var d=document.createElement('div');
    d.className='frost-dot';
    var sz=2+Math.random()*2;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;background:'+colors[i%3]+';--fd:'+(8+Math.random()*12)+'s;--fdd:'+(Math.random()*8)+'s;--fx:'+(Math.random()*60-30)+'px;--fy:'+(Math.random()*60-30)+'px';
    box.appendChild(d);
  }
})();

// CountUp
(function(){
  var els=document.querySelectorAll('.kpi-num');
  var dur=1500;
  setTimeout(function(){
    els.forEach(function(el){
      var target=parseInt(el.dataset.target);
      var dec=el.dataset.decimal?parseInt(el.dataset.decimal):0;
      var prefix=el.dataset.prefix||'';
      var suffix=el.dataset.suffix||'';
      var comma=el.hasAttribute('data-comma');
      var start=performance.now();
      function tick(now){
        var p=Math.min((now-start)/dur,1);
        var ease=1-Math.pow(1-p,3);
        var val=target*ease;
        var display;
        if(dec>0){display=(val/Math.pow(10,dec)).toFixed(dec)}
        else{display=Math.round(val);if(comma)display=display.toLocaleString()}
        el.textContent=prefix+display+suffix;
        if(p<1)requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  },300);
})();

// Ring gauge animation
(function(){
  setTimeout(function(){
    document.getElementById('gauge1').style.setProperty('--gauge-deg','259.2deg');
    document.getElementById('gauge2').style.setProperty('--gauge-deg','338.4deg');
  },600);
  // Add transition
  var rings=document.querySelectorAll('.gauge-ring');
  rings.forEach(function(r){r.style.transition='--gauge-deg 1.5s ease-out'});
  // Fallback: use CSS class
})();

// Dot pop animation
var style=document.createElement('style');
style.textContent='@keyframes dotPop{from{opacity:0;r:0}to{opacity:1;r:3.5}}';
document.head.appendChild(style);
</script>
<script src="nav.js"></script>
</body>
</html>
