<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保龄球记分 — 荧光道 GLOW LANE</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0818;--uv:#6020C0;--pink:#FF20A0;--green:#20FF60;--yellow:#E0FF20;--orange:#FF8020;--dim:#3020A0;--glow-p:0 0 4px #FF20A0,0 0 10px #FF20A0,0 0 20px rgba(255,32,160,0.2);--glow-g:0 0 4px #20FF60,0 0 10px #20FF60,0 0 20px rgba(32,255,96,0.2);--glow-y:0 0 4px #E0FF20,0 0 10px #E0FF20,0 0 20px rgba(224,255,32,0.2)}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--bg);color:#e0d8f0;font-family:'Noto Sans SC',sans-serif;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}

  /* Fluorescent particles */
  .uv-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .uv-dot{position:absolute;border-radius:50%;animation:uvFloat var(--ud) ease-in-out infinite var(--udd)}
  @keyframes uvFloat{0%,100%{transform:translate(0,0);opacity:.2}50%{transform:translate(var(--ux),var(--uy));opacity:.5}}

  .page{max-width:500px;width:100%;position:relative;z-index:1;animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.5rem}
  .h-title{font-family:'Bungee Shade',cursive;font-size:clamp(1.6rem,5vw,2.2rem);color:var(--pink);
    text-shadow:0 0 8px var(--pink),0 0 20px rgba(255,32,160,0.3)}
  .h-en{font-family:'Bungee Shade',cursive;font-size:0.7rem;color:var(--uv);letter-spacing:0.12em;margin-top:0.1rem;
    text-shadow:0 0 6px var(--uv)}
  .h-lane{font-size:0.82rem;color:rgba(224,216,240,0.3);margin-top:0.4rem}

  /* ═══ PLAYERS ═══ */
  .players{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1.2rem;font-weight:700;font-size:1.1rem}
  .player-a{color:var(--pink);text-shadow:var(--glow-p)}
  .player-vs{color:rgba(224,216,240,0.2);font-weight:300}
  .player-b{color:var(--green);text-shadow:var(--glow-g)}

  /* ═══ SCORE TABLE ═══ */
  .score-wrap{overflow-x:auto;margin-bottom:1.5rem;-webkit-overflow-scrolling:touch}
  .score-table{width:100%;border-collapse:separate;border-spacing:3px;min-width:440px}
  .score-table th,.score-table td{padding:0.3rem 0.1rem;text-align:center;font-size:0.8rem;border:1px solid rgba(96,32,192,0.2);
    background:rgba(48,32,160,0.08)}
  .score-table th{font-size:0.65rem;color:rgba(224,216,240,0.3);font-weight:400;letter-spacing:0.05em}
  .score-table .name-cell{font-weight:700;font-size:0.85rem;text-align:left;padding-left:0.5rem;width:50px}
  .name-pink{color:var(--pink)}
  .name-green{color:var(--green)}
  .frame-score{font-weight:300;font-size:0.7rem;color:rgba(224,216,240,0.25)}
  .total-cell{font-weight:700;font-size:1rem;border:1px solid rgba(255,32,160,0.2);box-shadow:var(--glow-p)}

  .strike{color:var(--yellow);font-weight:700;text-shadow:var(--glow-y);animation:strikePulse 1.5s ease-in-out infinite}
  @keyframes strikePulse{0%,100%{opacity:1}50%{opacity:0.6}}
  .spare{color:var(--green);font-weight:700;text-shadow:var(--glow-g)}

  /* ═══ PINS ═══ */
  .pins-area{text-align:center;margin-bottom:1.5rem}
  .pins-label{font-size:0.75rem;color:rgba(224,216,240,0.2);margin-bottom:0.5rem}
  .pins{display:inline-block}
  .pin-row{display:flex;justify-content:center;gap:6px;margin-bottom:4px}
  .pin{width:14px;height:14px;border-radius:50%;background:rgba(224,216,240,0.15);border:1px solid rgba(224,216,240,0.1);
    transition:all .2s}
  .pin.standing{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 4px var(--yellow),0 0 8px rgba(224,255,32,0.2)}

  /* ═══ RESULT ═══ */
  .result{text-align:center;margin-bottom:1.5rem;padding:1rem;border:1px solid rgba(255,32,160,0.15);
    box-shadow:0 0 15px rgba(255,32,160,0.05);border-radius:8px}
  .result-score{font-family:'Bungee Shade',cursive;font-size:1.8rem;color:var(--pink);text-shadow:var(--glow-p)}
  .result-winner{font-weight:700;font-size:1rem;color:var(--yellow);margin-top:0.3rem;
    animation:winnerFlash 0.8s ease-in-out infinite alternate;text-shadow:var(--glow-y)}
  @keyframes winnerFlash{from{opacity:0.7}to{opacity:1}}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center}
  .footer-motto{font-family:'Bungee Shade',cursive;font-size:0.75rem;color:var(--uv);opacity:0.4;text-shadow:0 0 4px var(--uv)}
  .footer-disc{font-size:0.55rem;color:rgba(224,216,240,0.1);margin-top:0.2rem}

  @media(max-width:420px){body{padding:1rem}.score-table{min-width:400px}}
</style>
</head>
<body>

<div class="uv-particles" id="uvParticles"></div>

<div class="page">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <h1 class="h-title">荧光道</h1>
    <div class="h-en">GLOW LANE</div>
    <div class="h-lane">Lane 7 · 2026.03.25</div>
  </header>

  <!-- ═══ PLAYERS ═══ -->
  <div class="players">
    <span class="player-a">小明</span>
    <span class="player-vs">vs</span>
    <span class="player-b">小红</span>
  </div>

  <!-- ═══ SCORE TABLE ═══ -->
  <div class="score-wrap">
    <table class="score-table">
      <tr>
        <th></th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>TOT</th>
      </tr>
      <tr>
        <td class="name-cell name-pink">小明</td>
        <td>8/1<div class="frame-score">9</div></td>
        <td><span class="strike">X</span><div class="frame-score">28</div></td>
        <td>7<span class="spare">/</span><div class="frame-score">45</div></td>
        <td>6/2<div class="frame-score">53</div></td>
        <td><span class="strike">X</span><div class="frame-score">73</div></td>
        <td><span class="strike">X</span><div class="frame-score">93</div></td>
        <td>9/0<div class="frame-score">102</div></td>
        <td>8<span class="spare">/</span><div class="frame-score">120</div></td>
        <td>5/3<div class="frame-score">128</div></td>
        <td><span class="strike">X</span>7/2<div class="frame-score">147</div></td>
        <td class="total-cell">147</td>
      </tr>
      <tr>
        <td class="name-cell name-green">小红</td>
        <td>7/2<div class="frame-score">9</div></td>
        <td>6<span class="spare">/</span><div class="frame-score">25</div></td>
        <td><span class="strike">X</span><div class="frame-score">45</div></td>
        <td>8/1<div class="frame-score">54</div></td>
        <td>9<span class="spare">/</span><div class="frame-score">70</div></td>
        <td>7/2<div class="frame-score">79</div></td>
        <td><span class="strike">X</span><div class="frame-score">99</div></td>
        <td>8/1<div class="frame-score">108</div></td>
        <td>6/3<div class="frame-score">117</div></td>
        <td>9<span class="spare">/</span>5<div class="frame-score">132</div></td>
        <td class="total-cell" style="box-shadow:var(--glow-g)">132</td>
      </tr>
    </table>
  </div>

  <!-- ═══ PINS ═══ -->
  <div class="pins-area">
    <div class="pins-label">PIN SETUP</div>
    <div class="pins">
      <div class="pin-row"><div class="pin standing"></div><div class="pin standing"></div><div class="pin standing"></div><div class="pin standing"></div></div>
      <div class="pin-row"><div class="pin standing"></div><div class="pin standing"></div><div class="pin standing"></div></div>
      <div class="pin-row"><div class="pin standing"></div><div class="pin standing"></div></div>
      <div class="pin-row"><div class="pin standing"></div></div>
    </div>
  </div>

  <!-- ═══ RESULT ═══ -->
  <div class="result">
    <div class="result-score">147 : 132</div>
    <div class="result-winner">小明获胜！</div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-motto">GLOW LANE · 在黑暗中发光</div>
    <div class="footer-disc">虚构保龄球馆 · 仅供展示</div>
  </footer>

</div>

<script>
// UV fluorescent particles
(function(){
  var c=document.getElementById('uvParticles');
  var colors=['#FF20A0','#20FF60','#E0FF20','#FF8020','#6020C0'];
  for(var i=0;i<18;i++){
    var d=document.createElement('div');
    d.className='uv-dot';
    var sz=2+Math.random()*3;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;background:'+colors[i%5]+';--ud:'+(6+Math.random()*10)+'s;--udd:'+(Math.random()*6)+'s;--ux:'+(Math.random()*40-20)+'px;--uy:'+(Math.random()*40-20)+'px';
    c.appendChild(d);
  }
})();
</script>
<script src="nav.js"></script>
</body>
</html>
