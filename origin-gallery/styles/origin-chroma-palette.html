<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色域 CHROMA — 精选配色方案</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fff;--text:#1A1A1A;--dim:rgba(26,26,26,0.35);--light:#F8F8FA}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Manrope',sans-serif;font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased}

  /* ═══ SPECTRUM BAR ═══ */
  .spectrum{height:6px;background:linear-gradient(90deg,#FF0000,#FF8800,#FFFF00,#00FF00,#0088FF,#8800FF,#FF0088,#FF0000);
    background-size:200% 100%;animation:spectrumFlow 6s linear infinite}
  @keyframes spectrumFlow{0%{background-position:0% 0}100%{background-position:200% 0}}

  .page{max-width:580px;margin:0 auto;padding:2rem 1.5rem}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:2.5rem;animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .h-title{font-weight:700;font-size:1.8rem;letter-spacing:0.06em}
  .h-en{font-family:'Manrope',sans-serif;font-weight:400;font-size:0.75rem;color:var(--dim);letter-spacing:0.15em;margin-top:0.2rem}
  .h-tip{font-size:0.85rem;color:var(--dim);margin-top:0.6rem}

  /* ═══ PALETTE GROUP ═══ */
  .palette{margin-bottom:2.5rem}
  .pal-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.8rem}
  .pal-name{font-weight:600;font-size:1rem}
  .pal-en{font-family:'Manrope',sans-serif;font-weight:400;font-size:0.7rem;color:var(--dim);letter-spacing:0.08em}

  .swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

  /* Pantone swatch card */
  .swatch{cursor:pointer;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:transform .2s,box-shadow .2s;position:relative;
    opacity:0;transform:scale(0.9);animation:swatchIn .4s ease forwards}
  @keyframes swatchIn{to{opacity:1;transform:scale(1)}}
  .swatch:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:2}
  .swatch:active{transform:scale(1.02)}

  .swatch-color{height:90px;transition:height .2s}
  .swatch:hover .swatch-color{height:95px}

  .swatch-label{background:#fff;padding:6px 4px;text-align:center;
    font-family:'Manrope',sans-serif;font-weight:500;font-size:0.65rem;color:var(--text);letter-spacing:0.03em;
    transition:font-size .2s}
  .swatch:hover .swatch-label{font-size:0.72rem}

  /* Dark swatch border */
  .swatch-dark{box-shadow:0 2px 8px rgba(0,0,0,0.15)}

  /* Copy feedback */
  .swatch-copied{position:absolute;inset:0;background:rgba(0,0,0,0.6);color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Manrope',sans-serif;font-weight:600;font-size:0.75rem;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .15s}
  .swatch-copied.show{opacity:1}

  /* ═══ USAGE TIP ═══ */
  .usage{text-align:center;padding:1rem;background:var(--light);border-radius:10px;margin-bottom:2rem;font-size:0.88rem;color:var(--dim)}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center}
  .footer-motto{font-weight:500;font-size:0.9rem;color:var(--dim);opacity:0.4}
  .footer-disc{font-size:0.6rem;color:var(--dim);opacity:0.15;margin-top:0.3rem}

  @media(max-width:500px){
    .page{padding:1.5rem 1rem}
    .swatches{grid-template-columns:repeat(5,1fr);gap:5px}
    .swatch-color{height:70px}
  }
</style>
</head>
<body>

<div class="spectrum"></div>

<div class="page">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <h1 class="h-title">色域</h1>
    <div class="h-en">CHROMA · 精选配色方案</div>
    <div class="h-tip">点击色块复制色值 · 为你的下一个项目找到灵感</div>
  </header>

  <!-- ═══ PALETTES ═══ -->
  <div id="palettes"></div>

  <!-- ═══ USAGE ═══ -->
  <div class="usage">所有配色方案均可自由使用 · 复制色值直接粘贴到设计工具</div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-motto">色域 · CHROMA · 色彩是设计的灵魂</div>
    <div class="footer-disc">虚构工具 · 仅供展示</div>
  </footer>

</div>

<script>
var palettes=[
  {name:'日落海岸',en:'SUNSET COAST',colors:['#FF6B6B','#FEC89A','#FFD93D','#6BCB77','#4D96FF']},
  {name:'午夜森林',en:'MIDNIGHT FOREST',colors:['#0B0B0D','#1A3A2A','#2D6A4F','#52B788','#95D5B2']},
  {name:'东京霓虹',en:'TOKYO NEON',colors:['#0F0E17','#FF2E63','#E94560','#7B2D8E','#00D2FC']},
  {name:'奶油甜品',en:'CREAM DESSERT',colors:['#FFF5E4','#FFE5D9','#FFD7BA','#FEC89A','#D4A373']}
];

function isDark(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000<128;
}

function copyColor(hex,el){
  var fb=el.querySelector('.swatch-copied');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(hex).then(function(){show()}).catch(function(){fallback();show()});
  }else{fallback();show()}
  function fallback(){
    var ta=document.createElement('textarea');ta.value=hex;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);
  }
  function show(){fb.classList.add('show');setTimeout(function(){fb.classList.remove('show')},800)}
}

var container=document.getElementById('palettes');
var globalIdx=0;
palettes.forEach(function(p,pi){
  var div=document.createElement('div');
  div.className='palette';
  var header='<div class="pal-header"><span class="pal-name">'+p.name+'</span><span class="pal-en">'+p.en+'</span></div>';
  var swatchesHtml='<div class="swatches">';
  p.colors.forEach(function(c,ci){
    var dark=isDark(c)?'swatch-dark':'';
    var delay=(0.2+globalIdx*0.06).toFixed(2);
    swatchesHtml+='<div class="swatch '+dark+'" style="animation-delay:'+delay+'s" onclick="copyColor(\''+c+'\',this)">';
    swatchesHtml+='<div class="swatch-color" style="background:'+c+'"></div>';
    swatchesHtml+='<div class="swatch-label">'+c+'</div>';
    swatchesHtml+='<div class="swatch-copied">已复制!</div>';
    swatchesHtml+='</div>';
    globalIdx++;
  });
  swatchesHtml+='</div>';
  div.innerHTML=header+swatchesHtml;
  container.appendChild(div);
});
</script>
<script src="nav.js"></script>
</body>
</html>
