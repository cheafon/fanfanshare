<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暖光计划 WARMLIGHT — 为山区孩子点亮一盏灯</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--dark:#0A0A14;--red:#FF0040;--cyan:#00D4FF;--white:#E8ECF0;--gray:#555;--purple:#8844AA}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--dark);color:var(--white);font-family:'Noto Sans SC','Archivo',sans-serif;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 50% 40%,rgba(136,68,170,0.04) 0%,transparent 60%)}

  .page{max-width:440px;width:100%;position:relative;z-index:1}

  /* ═══ ANAGLYPH TEXT ═══ */
  .ana{position:relative;display:inline-block}
  .ana::before,.ana::after{content:attr(data-t);position:absolute;top:0;left:0;opacity:0.6;mix-blend-mode:screen}
  .ana::before{color:var(--red);transform:translateX(-3px)}
  .ana::after{color:var(--cyan);transform:translateX(3px)}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.5rem;animation:fadeIn .6s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .h-brand{font-family:'Archivo',sans-serif;font-weight:900;font-size:1.6rem;color:var(--white);letter-spacing:0.06em}
  .h-en{font-family:'Archivo',sans-serif;font-weight:400;font-size:0.68rem;color:var(--gray);letter-spacing:0.25em}
  .h-sub{font-size:0.88rem;color:rgba(232,236,240,0.35);margin-top:0.4rem}

  /* ═══ THERMOMETER ═══ */
  .thermo-section{display:flex;align-items:flex-end;justify-content:center;gap:1.2rem;margin-bottom:1.5rem;
    animation:fadeIn .6s ease both;animation-delay:.15s}
  .thermo{position:relative;width:36px;height:220px}
  .thermo-tube{position:absolute;top:0;left:8px;width:20px;height:190px;border-radius:10px;
    border:2px solid rgba(232,236,240,0.1);overflow:hidden}
  .thermo-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 8px 8px;
    background:linear-gradient(0deg,var(--red),var(--purple) 50%,var(--cyan));
    height:0%;transition:height 2s cubic-bezier(0.4,0,0.2,1)}
  .thermo-bulb{position:absolute;bottom:-8px;left:2px;width:32px;height:32px;border-radius:50%;
    border:2px solid rgba(232,236,240,0.1);background:var(--red);
    box-shadow:0 0 12px rgba(255,0,64,0.2)}
  /* Milestone markers */
  .milestone{position:absolute;left:32px;font-family:'Archivo',sans-serif;font-size:0.55rem;color:var(--gray);
    display:flex;align-items:center;gap:4px;opacity:0.4;transition:all .3s}
  .milestone::before{content:'';width:6px;height:1px;background:var(--gray)}
  .milestone.hit{opacity:1;color:var(--cyan)}
  .m-25{bottom:25%}.m-50{bottom:50%}.m-75{bottom:75%}.m-100{top:-2px}

  .thermo-info{text-align:left}
  .ti-goal{font-size:0.78rem;color:var(--gray)}
  .ti-raised{font-family:'Archivo',sans-serif;font-weight:800;font-size:2rem;color:var(--white);line-height:1.1;
    position:relative}
  .ti-raised::before,.ti-raised::after{position:absolute;top:0;left:0;opacity:0.5;mix-blend-mode:screen}
  .ti-raised::before{content:attr(data-v);color:var(--red);transform:translateX(-2px)}
  .ti-raised::after{content:attr(data-v);color:var(--cyan);transform:translateX(2px)}
  .ti-pct{font-family:'Archivo',sans-serif;font-weight:700;font-size:1.1rem;color:var(--cyan);margin-top:0.2rem}
  .ti-donors{font-size:0.82rem;color:var(--gray);margin-top:0.3rem}

  /* ═══ DONORS ═══ */
  .donors{margin-bottom:1.2rem}
  .donors-label{font-family:'Archivo',sans-serif;font-weight:600;font-size:0.6rem;color:var(--gray);
    letter-spacing:0.15em;margin-bottom:0.5rem}
  .donor{display:flex;justify-content:space-between;align-items:center;padding:0.45rem 0.6rem;margin-bottom:0.2rem;
    border-radius:4px;transition:all .25s;cursor:default;
    opacity:0;animation:fadeIn .4s ease forwards;
    background:rgba(232,236,240,0.015)}
  .donor:hover{background:rgba(232,236,240,0.03)}
  /* Depth offset layers */
  .donor:nth-child(2){text-shadow:-1px 0 rgba(255,0,64,0.08),1px 0 rgba(0,212,255,0.08)}
  .donor:nth-child(3){text-shadow:-2px 0 rgba(255,0,64,0.06),2px 0 rgba(0,212,255,0.06)}
  .donor:nth-child(4){text-shadow:-1px 0 rgba(255,0,64,0.1),1px 0 rgba(0,212,255,0.1)}
  .donor:nth-child(5){text-shadow:-2px 0 rgba(255,0,64,0.05),2px 0 rgba(0,212,255,0.05)}
  .donor:nth-child(6){text-shadow:-3px 0 rgba(255,0,64,0.04),3px 0 rgba(0,212,255,0.04)}

  .d-name{font-size:0.88rem;color:var(--white)}
  .d-right{text-align:right}
  .d-amount{font-family:'Archivo',sans-serif;font-weight:600;font-size:0.88rem;color:var(--cyan)}
  .d-time{font-size:0.68rem;color:var(--gray)}

  /* ═══ INFO ═══ */
  .info{border:1px solid rgba(232,236,240,0.04);border-radius:6px;padding:0.9rem 1rem;margin-bottom:1rem;
    opacity:0;animation:fadeIn .5s ease both;animation-delay:1s;
    background:rgba(136,68,170,0.02)}
  .info-label{font-family:'Archivo',sans-serif;font-weight:600;font-size:0.6rem;color:var(--purple);letter-spacing:0.1em;margin-bottom:0.3rem}
  .info-text{font-size:0.88rem;color:rgba(232,236,240,0.4);line-height:1.8}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;opacity:0;animation:fadeIn .5s ease both;animation-delay:1.1s}
  .footer-motto{font-family:'Archivo',sans-serif;font-size:0.78rem;color:var(--gray);opacity:0.3}
  .footer-disc{font-size:0.55rem;color:var(--gray);opacity:0.12;margin-top:0.2rem}

  @media(max-width:400px){body{padding:1rem}.ti-raised{font-size:1.6rem}.thermo{height:180px}.thermo-tube{height:155px}}
</style>
</head>
<body>

<div class="page">

  <header class="header">
    <div class="h-brand"><span class="ana" data-t="暖光计划">暖光计划</span></div>
    <div class="h-en">WARMLIGHT PROJECT</div>
    <div class="h-sub">为山区孩子点亮一盏灯</div>
  </header>

  <!-- ═══ THERMOMETER ═══ -->
  <div class="thermo-section">
    <div class="thermo">
      <div class="thermo-tube">
        <div class="thermo-fill" id="thermoFill"></div>
      </div>
      <div class="thermo-bulb"></div>
      <div class="milestone m-25" id="m25">25%</div>
      <div class="milestone m-50" id="m50">50%</div>
      <div class="milestone m-75" id="m75">75%</div>
      <div class="milestone m-100" id="m100">100%</div>
    </div>
    <div class="thermo-info">
      <div class="ti-goal">目标 ¥500,000</div>
      <div class="ti-raised" id="raised" data-v="¥0">¥0</div>
      <div class="ti-pct" id="pct">0%</div>
      <div class="ti-donors">2,847 位爱心人士 · 平均 ¥126</div>
    </div>
  </div>

  <!-- ═══ RECENT DONORS ═══ -->
  <div class="donors">
    <div class="donors-label">RECENT DONORS</div>
    <div class="donor" style="animation-delay:.5s"><span class="d-name">匿名</span><div class="d-right"><div class="d-amount">¥500</div><div class="d-time">3 分钟前</div></div></div>
    <div class="donor" style="animation-delay:.58s"><span class="d-name">小星星</span><div class="d-right"><div class="d-amount">¥100</div><div class="d-time">12 分钟前</div></div></div>
    <div class="donor" style="animation-delay:.66s"><span class="d-name">温暖的风</span><div class="d-right"><div class="d-amount">¥200</div><div class="d-time">28 分钟前</div></div></div>
    <div class="donor" style="animation-delay:.74s"><span class="d-name">向日葵</span><div class="d-right"><div class="d-amount">¥50</div><div class="d-time">1 小时前</div></div></div>
    <div class="donor" style="animation-delay:.82s"><span class="d-name">一点光</span><div class="d-right"><div class="d-amount">¥1,000</div><div class="d-time">2 小时前</div></div></div>
  </div>

  <!-- ═══ INFO ═══ -->
  <div class="info">
    <div class="info-label">ABOUT</div>
    <div class="info-text">善款将用于为云南山区 3 所小学安装太阳能路灯，让孩子们在冬天不再摸黑上学。每 ¥2,000 可点亮一盏路灯。</div>
  </div>

  <footer class="footer">
    <div class="footer-motto">暖光计划 · WARMLIGHT · 再小的光也能照亮一段路</div>
    <div class="footer-disc">虚构公益 · 仅供展示</div>
  </footer>

</div>

<script>
// Counter + thermometer animation
var target=360000;
var raisedEl=document.getElementById('raised');
var pctEl=document.getElementById('pct');
var fillEl=document.getElementById('thermoFill');
var dur=2000;var start=performance.now();

function tick(now){
  var elapsed=now-start;
  var p=Math.min(elapsed/dur,1);
  var e=1-Math.pow(1-p,3);
  var val=Math.floor(e*target);
  var str='¥'+val.toLocaleString();
  raisedEl.textContent=str;
  raisedEl.dataset.v=str;
  var pctVal=Math.floor(e*72);
  pctEl.textContent=pctVal+'%';
  fillEl.style.height=pctVal+'%';

  // Milestone hits
  if(pctVal>=25)document.getElementById('m25').classList.add('hit');
  if(pctVal>=50)document.getElementById('m50').classList.add('hit');
  if(pctVal>=72)document.getElementById('m75').classList.add('hit');

  if(p<1)requestAnimationFrame(tick);
}
setTimeout(function(){requestAnimationFrame(tick)},500);
</script>
<script src="nav.js"></script>
</body>
</html>
