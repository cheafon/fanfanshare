<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第 100 个！— HTML 创意工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--sky:#0A0A20;--gold:#FFD700;--red:#FF4040;--blue:#4090FF;--green:#40FF90;--purple:#B040FF;--star:#F0F0FF}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--sky);color:var(--star);font-family:'Noto Sans SC',sans-serif;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem;-webkit-font-smoothing:antialiased;
    overflow:hidden;position:relative}

  /* Firework & confetti container */
  .fx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .spark{position:absolute;border-radius:50%;pointer-events:none}
  .confetti{position:absolute;top:-10px;pointer-events:none;animation:confettiFall var(--cd) linear infinite var(--cdd)}
  @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg) translateX(0)}50%{transform:translateY(50vh) rotate(180deg) translateX(var(--cx))}100%{transform:translateY(105vh) rotate(360deg) translateX(0)}}

  .page{max-width:460px;width:100%;position:relative;z-index:1;text-align:center}

  /* ═══ BADGE ═══ */
  .badge{width:100px;height:100px;margin:0 auto 1rem;border-radius:50%;
    background:conic-gradient(var(--gold),#FFA500,var(--gold),#FFC800,var(--gold));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 20px rgba(255,215,0,0.3),0 0 60px rgba(255,215,0,0.1);
    animation:badgeSpin 1s ease both,badgeGlow 2s ease-in-out infinite alternate}
  @keyframes badgeSpin{from{transform:scale(0) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  @keyframes badgeGlow{from{box-shadow:0 0 20px rgba(255,215,0,0.3),0 0 60px rgba(255,215,0,0.1)}to{box-shadow:0 0 30px rgba(255,215,0,0.5),0 0 80px rgba(255,215,0,0.15)}}
  .badge-inner{width:80px;height:80px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;color:var(--gold)}

  /* ═══ HERO NUMBER ═══ */
  .hero-num{font-family:'Abril Fatface',serif;font-size:clamp(6rem,20vw,9rem);line-height:1;
    background:linear-gradient(135deg,var(--gold),#FFA500,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    text-shadow:none;filter:drop-shadow(0 0 20px rgba(255,215,0,0.3));
    animation:numIn 2.5s ease both}
  @keyframes numIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

  .hero-en{font-family:'Abril Fatface',serif;font-size:clamp(1rem,3vw,1.3rem);color:var(--gold);letter-spacing:0.15em;
    opacity:0;animation:bounceIn .6s 2.2s cubic-bezier(0.34,1.56,0.64,1) both}
  @keyframes bounceIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
  .hero-cn{font-weight:700;font-size:1.1rem;color:var(--star);margin-top:0.3rem;
    opacity:0;animation:bounceIn .6s 2.5s cubic-bezier(0.34,1.56,0.64,1) both}

  /* ═══ STATS ═══ */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:2rem 0;
    opacity:0;animation:fadeIn .5s 3s ease both}
  @keyframes fadeIn{to{opacity:1}}
  .stat{padding:0.8rem;border:1px solid rgba(255,215,0,0.1);border-radius:8px;background:rgba(255,215,0,0.02)}
  .stat-num{font-family:'Abril Fatface',serif;font-size:1.8rem;color:var(--gold)}
  .stat-label{font-size:0.78rem;color:rgba(240,240,255,0.35);margin-top:0.1rem}

  /* ═══ CELEBRATION TEXT ═══ */
  .celeb{opacity:0;animation:fadeIn .5s 3.5s ease both;margin-bottom:2rem}
  .celeb-title{font-weight:700;font-size:1rem;color:var(--gold);opacity:0.6;margin-bottom:0.5rem}
  .celeb-text{font-weight:300;font-size:0.92rem;color:rgba(240,240,255,0.35);line-height:2}
  .celeb-styles{font-size:0.82rem;color:rgba(240,240,255,0.2);margin-top:0.5rem}

  .quote{font-family:'Abril Fatface',serif;font-size:1.05rem;color:var(--gold);opacity:0.4;margin-bottom:2rem;
    opacity:0;animation:fadeIn .5s 4s ease both}

  /* ═══ FOOTER ═══ */
  .footer{opacity:0;animation:fadeIn .5s 4.5s ease both}
  .footer-motto{font-weight:500;font-size:0.85rem;color:rgba(240,240,255,0.25)}
  .footer-credit{font-size:0.7rem;color:rgba(240,240,255,0.12);margin-top:0.2rem}
  .footer-disc{font-size:0.55rem;color:rgba(240,240,255,0.08);margin-top:0.2rem}

  @media(max-width:400px){body{padding:1.5rem}.hero-num{font-size:5rem}}
</style>
</head>
<body>

<div class="fx" id="fx"></div>

<div class="page">

  <!-- ═══ BADGE ═══ -->
  <div class="badge"><div class="badge-inner">★</div></div>

  <!-- ═══ HERO ═══ -->
  <div class="hero-num" id="heroNum">0</div>
  <div class="hero-en">ACHIEVEMENT UNLOCKED</div>
  <div class="hero-cn">成就解锁：HTML 百页达成！</div>

  <!-- ═══ STATS ═══ -->
  <div class="stats">
    <div class="stat"><div class="stat-num" data-target="100" data-delay="3200">0</div><div class="stat-label">独特风格</div></div>
    <div class="stat"><div class="stat-num" data-target="100" data-delay="3400">0</div><div class="stat-label">页面类型</div></div>
    <div class="stat"><div class="stat-num" data-target="100" data-delay="3600">0</div><div class="stat-label">完整 Prompt</div></div>
    <div class="stat"><div class="stat-num" data-target="0" data-delay="3800">0</div><div class="stat-label">重复设计</div></div>
  </div>

  <!-- ═══ CELEBRATION ═══ -->
  <div class="celeb">
    <div class="celeb-title">从侘寂咖啡到烟花庆典</div>
    <div class="celeb-text">100 种视觉风格，100 种页面类型<br>每一个都独一无二，每一个都可以复制使用</div>
    <div class="celeb-styles">侘寂 · 孟菲斯 · 赛博朋克 · 浮世绘 · 水墨 · 霓虹 · 像素 · 极光 · 烟花 …</div>
  </div>

  <div class="quote">这不是终点，是下一个 100 的起点</div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-motto">HTML + CSS + JS = 无限可能</div>
    <div class="footer-credit">由 Claude 自动生成 · HTML 创意工坊</div>
    <div class="footer-disc">虚构庆祝 · 仅供展示</div>
  </footer>

</div>

<script>
// ═══ FIREWORK SYSTEM ═══
var fx=document.getElementById('fx');
var colors=['#FFD700','#FF4040','#4090FF','#40FF90','#B040FF','#FFA500'];

function firework(){
  var x=10+Math.random()*80;
  var color=colors[Math.floor(Math.random()*colors.length)];

  // Rocket
  var rocket=document.createElement('div');
  rocket.className='spark';
  rocket.style.cssText='left:'+x+'%;bottom:0;width:3px;height:3px;background:'+color+';box-shadow:0 0 4px '+color+';transition:all 0.8s ease-out';
  fx.appendChild(rocket);
  requestAnimationFrame(function(){
    rocket.style.bottom=(50+Math.random()*30)+'%';
    rocket.style.opacity='0.5';
  });

  // Explode
  setTimeout(function(){
    var peakX=rocket.getBoundingClientRect().left;
    var peakY=rocket.getBoundingClientRect().top;
    rocket.remove();

    for(var i=0;i<22;i++){
      var spark=document.createElement('div');
      spark.className='spark';
      var angle=(i/22)*Math.PI*2;
      var dist=40+Math.random()*60;
      var dx=Math.cos(angle)*dist;
      var dy=Math.sin(angle)*dist;
      var sz=2+Math.random()*2;
      spark.style.cssText='left:'+peakX+'px;top:'+peakY+'px;width:'+sz+'px;height:'+sz+'px;background:'+color+';box-shadow:0 0 4px '+color+';transition:all '+(0.6+Math.random()*0.5)+'s ease-out;opacity:1';
      fx.appendChild(spark);
      requestAnimationFrame(function(s,ddx,ddy){return function(){
        s.style.left=(peakX+ddx)+'px';s.style.top=(peakY+ddy+30)+'px';s.style.opacity='0';
      }}(spark,dx,dy));
      setTimeout(function(s){return function(){s.remove()}}(spark),1200);
    }
  },800);
}
setInterval(firework,900);
setTimeout(firework,300);
setTimeout(firework,600);

// ═══ GOLD CONFETTI ═══
for(var i=0;i<25;i++){
  var c=document.createElement('div');
  c.className='confetti';
  var sz=3+Math.random()*4;
  var gold=Math.random()>0.3?'#FFD700':'#FFA500';
  c.style.cssText='left:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;background:'+gold+';border-radius:'+(Math.random()>0.5?'50%':'1px')+';opacity:'+(0.3+Math.random()*0.4)+';--cd:'+(4+Math.random()*6)+'s;--cdd:'+(Math.random()*8)+'s;--cx:'+(Math.random()*30-15)+'px';
  fx.appendChild(c);
}

// ═══ HERO COUNT-UP ═══
(function(){
  var el=document.getElementById('heroNum');
  var dur=2000,start=performance.now();
  function tick(now){
    var p=Math.min((now-start)/dur,1);
    var ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(100*ease);
    if(p<1)requestAnimationFrame(tick);
  }
  setTimeout(function(){requestAnimationFrame(tick)},500);
})();

// ═══ STAT COUNT-UPS ═══
document.querySelectorAll('.stat-num').forEach(function(el){
  var target=parseInt(el.dataset.target);
  var delay=parseInt(el.dataset.delay);
  if(target===0){setTimeout(function(){el.textContent='0'},delay);return}
  setTimeout(function(){
    var dur=1200,start=performance.now();
    function tick(now){
      var p=Math.min((now-start)/dur,1);
      el.textContent=Math.round(target*(1-Math.pow(1-p,3)));
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  },delay);
});
</script>
<script src="nav.js"></script>
</body>
</html>
