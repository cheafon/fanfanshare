<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地下停车场导航 — 方盒子 CUBEMALL</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--concrete:#8A8A8A;--dark:#4A4A4A;--light:#C0C0C0;--form:#666;--yellow:#FFD600;--red:#D32F2F;--green:#43A047;--white:#F5F5F5;--black:#1A1A1A}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--dark);color:var(--white);font-family:'Noto Sans SC','Azeret Mono',monospace;font-weight:600;font-size:17px;line-height:1.6;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* Concrete with formwork seams */
    background-image:
      repeating-linear-gradient(0deg,transparent 0px,transparent 42px,rgba(102,102,102,0.12) 42px,rgba(102,102,102,0.12) 43px),
      repeating-linear-gradient(90deg,transparent 0px,transparent 80px,rgba(102,102,102,0.06) 80px,rgba(102,102,102,0.06) 81px),
      radial-gradient(ellipse 40px 30px at 25% 30%,rgba(26,26,26,0.06) 0%,transparent 70%),
      radial-gradient(ellipse 30px 40px at 70% 65%,rgba(26,26,26,0.05) 0%,transparent 70%)}

  .grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.04}

  .page{max-width:460px;width:100%;position:relative;z-index:1}

  /* Safety stripe */
  .safety-stripe{height:10px;background:repeating-linear-gradient(45deg,var(--yellow) 0px,var(--yellow) 8px,var(--black) 8px,var(--black) 16px);
    margin-bottom:1rem;border-radius:1px}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.2rem;animation:slideUp .5s ease both}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .h-brand{font-family:'Azeret Mono',monospace;font-weight:700;font-size:1.5rem;color:var(--white);letter-spacing:0.08em}
  .h-en{font-family:'Azeret Mono',monospace;font-weight:400;font-size:0.65rem;color:var(--concrete);letter-spacing:0.25em}
  .h-type{font-size:0.88rem;color:var(--yellow);margin-top:0.3rem;font-weight:700}

  /* ═══ CAR INFO ═══ */
  .car-info{background:rgba(26,26,26,0.4);padding:0.8rem 1rem;margin-bottom:1rem;border-left:4px solid var(--yellow);
    animation:slideUp .5s ease both;animation-delay:.1s}
  .car-plate{font-family:'Azeret Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--yellow)}
  .car-loc{font-size:0.85rem;color:var(--light);margin-top:0.1rem}
  .car-time{font-family:'Azeret Mono',monospace;font-size:0.78rem;color:var(--concrete);margin-top:0.1rem}

  /* ═══ FLOORS ═══ */
  .floors{margin-bottom:1rem}
  .floor{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 0.8rem;margin-bottom:0.3rem;
    background:rgba(74,74,74,0.3);border:2px solid transparent;border-radius:4px;transition:all .3s;
    opacity:0;animation:slideUp .4s ease forwards}
  .floor:hover{background:rgba(74,74,74,0.5)}
  .floor.highlight{border-color:var(--yellow);background:rgba(255,214,0,0.05)}
  .floor.highlight .f-badge{background:var(--yellow);color:var(--black)}
  @keyframes pulseYellow{0%,100%{box-shadow:0 0 0 0 rgba(255,214,0,0.3)}50%{box-shadow:0 0 0 8px rgba(255,214,0,0)}}

  .f-badge{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    font-family:'Azeret Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--white);
    background:var(--form);border-radius:4px;flex-shrink:0;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2),0 2px 4px rgba(0,0,0,0.2)}
  .f-info{flex:1}
  .f-name{font-weight:700;font-size:0.95rem;color:var(--white)}
  .f-you{font-size:0.72rem;color:var(--yellow);font-weight:700}
  .f-capacity{font-size:0.78rem;color:var(--concrete);margin-top:0.05rem}
  .f-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:0.3rem;overflow:hidden}
  .f-fill{height:100%;border-radius:2px;transition:width .8s ease}
  .f-fill.full{background:var(--red)}.f-fill.mid{background:var(--yellow)}.f-fill.low{background:var(--green)}

  .f-nav{display:flex;gap:0.3rem;flex-shrink:0}
  /* CSS arrows */
  .arrow{width:0;height:0;cursor:default}
  .arrow-up{border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid var(--light)}
  .arrow-right{border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid var(--green)}
  .arrow-label{font-size:0.55rem;color:var(--concrete);text-align:center;margin-top:1px}

  /* ═══ FIND CAR ═══ */
  .find-btn{display:block;width:100%;font-family:'Azeret Mono',monospace;font-weight:700;font-size:0.95rem;
    color:var(--black);background:var(--yellow);border:none;padding:0.7em;border-radius:4px;
    cursor:pointer;transition:all .2s;margin-bottom:1rem;letter-spacing:0.06em;
    animation:slideUp .4s ease both;animation-delay:.5s}
  .find-btn:hover{background:#FFEA00;transform:scale(1.02)}
  .find-btn.found{animation:pulseYellow 1.5s ease infinite}

  /* ═══ EXITS ═══ */
  .exits{display:flex;gap:0.6rem;margin-bottom:1rem;animation:slideUp .4s ease both;animation-delay:.6s}
  .exit{flex:1;padding:0.6rem;background:rgba(26,26,26,0.3);border-radius:4px;text-align:center;
    border:1px solid rgba(67,160,71,0.15);transition:all .2s}
  .exit:hover{border-color:var(--green)}
  .exit-name{font-family:'Azeret Mono',monospace;font-weight:700;font-size:0.82rem;color:var(--green)}
  .exit-dir{font-size:0.72rem;color:var(--concrete);margin-top:0.1rem}
  .exit-arrow{color:var(--green);font-size:1rem;margin-top:0.2rem}

  .safety-stripe.bottom{margin-bottom:0;margin-top:0.5rem}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;margin-top:0.8rem;animation:slideUp .4s ease both;animation-delay:.7s}
  .footer-warn{font-family:'Azeret Mono',monospace;font-size:0.78rem;color:var(--red);font-weight:700}
  .footer-disc{font-size:0.55rem;color:var(--concrete);opacity:0.3;margin-top:0.3rem}

  @media(max-width:400px){body{padding:1rem}.f-badge{width:40px;height:40px;font-size:0.95rem}}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="gf"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#gf)"/>
</svg>

<div class="page">

  <div class="safety-stripe"></div>

  <header class="header">
    <div class="h-brand">方盒子</div>
    <div class="h-en">CUBEMALL</div>
    <div class="h-type">地下停车场导航</div>
  </header>

  <div class="car-info">
    <div class="car-plate">沪A · 12345</div>
    <div class="car-loc">停放位置：B2 层 C 区 089 号</div>
    <div class="car-time">已停放 2 小时 15 分</div>
  </div>

  <div class="floors">
    <div class="floor" style="animation-delay:.2s" id="floorB1">
      <div class="f-badge">B1</div>
      <div class="f-info">
        <div class="f-name">B1 层</div>
        <div class="f-capacity">剩余车位 45 / 120</div>
        <div class="f-bar"><div class="f-fill mid" style="width:62%"></div></div>
      </div>
      <div class="f-nav">
        <div><div class="arrow arrow-up"></div><div class="arrow-label">电梯</div></div>
        <div><div class="arrow arrow-right"></div><div class="arrow-label">出口</div></div>
      </div>
    </div>

    <div class="floor highlight" style="animation-delay:.3s" id="floorB2">
      <div class="f-badge">B2</div>
      <div class="f-info">
        <div class="f-name">B2 层 <span class="f-you">← 你的车在这里</span></div>
        <div class="f-capacity">剩余车位 12 / 150</div>
        <div class="f-bar"><div class="f-fill full" style="width:92%"></div></div>
      </div>
      <div class="f-nav">
        <div><div class="arrow arrow-up"></div><div class="arrow-label">电梯</div></div>
      </div>
    </div>

    <div class="floor" style="animation-delay:.4s" id="floorB3">
      <div class="f-badge">B3</div>
      <div class="f-info">
        <div class="f-name">B3 层</div>
        <div class="f-capacity">剩余车位 98 / 100 · VIP 专区</div>
        <div class="f-bar"><div class="f-fill low" style="width:2%"></div></div>
      </div>
      <div class="f-nav">
        <div><div class="arrow arrow-up"></div><div class="arrow-label">电梯</div></div>
      </div>
    </div>
  </div>

  <button class="find-btn" id="findBtn" onclick="findCar()">找我的车</button>

  <div class="exits">
    <div class="exit">
      <div class="exit-name">出口 A</div>
      <div class="exit-dir">东侧 · 愚园路</div>
      <div class="exit-arrow">→</div>
    </div>
    <div class="exit">
      <div class="exit-name">出口 B</div>
      <div class="exit-dir">南侧 · 长宁路</div>
      <div class="exit-arrow">↓</div>
    </div>
  </div>

  <div class="safety-stripe bottom"></div>

  <footer class="footer">
    <div class="footer-warn">⚠ 限高 2.1 米</div>
    <div class="footer-disc">方盒子 · CUBEMALL · 虚构商场 · 仅供展示</div>
  </footer>

</div>

<script>
function findCar(){
  var btn=document.getElementById('findBtn');
  var floor=document.getElementById('floorB2');
  btn.classList.add('found');
  btn.textContent='已定位 → B2 层 C 区 089';
  floor.scrollIntoView({behavior:'smooth',block:'center'});
  floor.style.animation='pulseYellow 1.5s ease infinite';
}
</script>
<script src="nav.js"></script>
</body>
</html>
