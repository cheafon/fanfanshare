<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 年末礼物交换 — 暖冬 WARMWINTER</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#C0392B;--blue:#2471A3;--green:#27AE60;--yellow:#F4D03F;--white:#FAFAFA;--cream:#FFF8DC;--dark:#2C3E50}
  *{margin:0;padding:0;box-sizing:border-box}

  body{background:var(--cream);color:var(--dark);font-family:'Noto Sans SC','Quicksand',sans-serif;font-weight:400;font-size:17px;line-height:1.7;
    display:flex;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* Subtle cross-stitch texture */
    background-image:
      radial-gradient(circle,rgba(192,57,43,0.02) 1px,transparent 1px),
      radial-gradient(circle,rgba(36,113,163,0.02) 1px,transparent 1px);
    background-size:12px 12px,12px 12px;background-position:0 0,6px 6px}

  .page{max-width:440px;width:100%;position:relative;z-index:1;
    /* Folk border top and bottom */
    border-top:4px solid var(--red);border-bottom:4px solid var(--red);padding-top:0}

  /* ═══ FOLK DIAMOND BORDER ═══ */
  .folk-border{height:16px;background:
    linear-gradient(45deg,var(--cream) 25%,transparent 25%) -8px 0,
    linear-gradient(-45deg,var(--cream) 25%,transparent 25%) -8px 0,
    linear-gradient(45deg,transparent 75%,var(--cream) 75%),
    linear-gradient(-45deg,transparent 75%,var(--cream) 75%);
    background-size:16px 16px;background-color:var(--red);margin-bottom:1rem}
  .folk-border.bottom{margin-bottom:0;margin-top:1rem}
  .folk-border.blue-bg{background-color:var(--blue)}

  /* ═══ HEADER ═══ */
  .header{text-align:center;margin-bottom:1.2rem;animation:popIn .5s ease both}
  @keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
  .h-brand{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.6rem;color:var(--red);letter-spacing:0.08em}
  .h-en{font-family:'Quicksand',sans-serif;font-weight:400;font-size:0.7rem;color:var(--blue);letter-spacing:0.2em}

  /* CSS Dala horse */
  .dala{width:50px;height:50px;margin:0.6rem auto;position:relative}
  .dala-body{width:40px;height:32px;background:var(--red);border-radius:4px 8px 2px 4px;position:absolute;top:12px;left:5px}
  .dala-head{width:16px;height:22px;background:var(--red);border-radius:6px 6px 2px 2px;position:absolute;top:2px;left:2px;transform:rotate(-10deg)}
  .dala-leg1,.dala-leg2,.dala-leg3,.dala-leg4{width:6px;height:12px;background:var(--red);border-radius:0 0 2px 2px;position:absolute}
  .dala-leg1{bottom:0;left:10px}.dala-leg2{bottom:0;left:20px}.dala-leg3{bottom:0;left:28px}.dala-leg4{bottom:0;left:38px}
  .dala-tail{width:10px;height:6px;background:var(--red);border-radius:0 4px 4px 0;position:absolute;top:14px;right:0}
  /* Yellow harness detail */
  .dala-body::after{content:'';position:absolute;inset:4px;border:1.5px solid var(--yellow);border-radius:2px 6px 1px 2px}

  .h-sub{font-size:0.92rem;color:var(--dark);opacity:0.6;margin-top:0.3rem}

  /* ═══ ROSEMALING FLOWERS ═══ */
  .rose{position:fixed;pointer-events:none;z-index:0}
  .rose-f{position:absolute}
  .rose-center{width:10px;height:10px;border-radius:50%;position:absolute}
  .rose-petal{position:absolute;border-radius:50%}
  /* Flower 1 — top left */
  .rf1{top:6%;left:4%}
  .rf1 .rose-center{background:var(--yellow);top:12px;left:12px}
  .rf1 .rose-petal:nth-child(1){width:12px;height:20px;background:var(--red);opacity:0.12;top:0;left:11px}
  .rf1 .rose-petal:nth-child(2){width:12px;height:20px;background:var(--red);opacity:0.1;top:14px;left:3px;transform:rotate(72deg)}
  .rf1 .rose-petal:nth-child(3){width:12px;height:20px;background:var(--red);opacity:0.1;top:14px;left:19px;transform:rotate(-72deg)}
  /* Flower 2 — top right */
  .rf2{top:10%;right:5%}
  .rf2 .rose-center{background:var(--yellow);top:12px;left:12px}
  .rf2 .rose-petal:nth-child(1){width:10px;height:16px;background:var(--blue);opacity:0.1;top:2px;left:10px}
  .rf2 .rose-petal:nth-child(2){width:10px;height:16px;background:var(--blue);opacity:0.08;top:12px;left:2px;transform:rotate(60deg)}
  .rf2 .rose-petal:nth-child(3){width:10px;height:16px;background:var(--blue);opacity:0.08;top:12px;left:18px;transform:rotate(-60deg)}
  /* Flower 3 — bottom left */
  .rf3{bottom:12%;left:3%}
  .rf3 .rose-center{background:var(--yellow);top:10px;left:10px;width:8px;height:8px}
  .rf3 .rose-petal:nth-child(1){width:10px;height:14px;background:var(--green);opacity:0.1;top:0;left:9px}
  .rf3 .rose-petal:nth-child(2){width:10px;height:14px;background:var(--green);opacity:0.08;top:10px;left:1px;transform:rotate(72deg)}
  /* Flower 4 — bottom right */
  .rf4{bottom:8%;right:4%}
  .rf4 .rose-center{background:var(--yellow);top:10px;left:10px;width:8px;height:8px}
  .rf4 .rose-petal:nth-child(1){width:10px;height:14px;background:var(--red);opacity:0.08;top:0;left:9px}
  .rf4 .rose-petal:nth-child(2){width:10px;height:14px;background:var(--blue);opacity:0.08;top:10px;left:16px;transform:rotate(-60deg)}

  /* ═══ RULES ═══ */
  .rules{background:var(--white);border:2px solid var(--blue);border-radius:8px;padding:0.8rem 1rem;
    margin-bottom:1.2rem;text-align:center;animation:popIn .5s ease both;animation-delay:.1s}
  .rules-items{display:flex;justify-content:center;gap:0.8rem;flex-wrap:wrap;font-size:0.85rem;color:var(--dark)}
  .rules-dot{color:var(--red);margin:0 0.2rem}

  /* ═══ PARTICIPANTS ═══ */
  .participants{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-bottom:1.2rem}
  .p-chip{font-family:'Quicksand',sans-serif;font-weight:600;font-size:0.82rem;padding:0.35em 0.9em;
    border-radius:20px;border:2px solid;opacity:0;animation:chipBounce .4s cubic-bezier(0.34,1.4,0.64,1) forwards}
  @keyframes chipBounce{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
  .p-chip:nth-child(1){border-color:var(--red);color:var(--red)}.p-chip:nth-child(2){border-color:var(--blue);color:var(--blue)}
  .p-chip:nth-child(3){border-color:var(--green);color:var(--green)}.p-chip:nth-child(4){border-color:var(--red);color:var(--red)}
  .p-chip:nth-child(5){border-color:var(--blue);color:var(--blue)}.p-chip:nth-child(6){border-color:var(--green);color:var(--green)}
  .p-chip:nth-child(7){border-color:var(--red);color:var(--red)}.p-chip:nth-child(8){border-color:var(--blue);color:var(--blue)}

  /* ═══ DRAW SECTION ═══ */
  .draw{text-align:center;margin-bottom:1.5rem;animation:popIn .5s ease both;animation-delay:.6s}
  .draw-you{font-size:0.92rem;color:var(--dark);opacity:0.6;margin-bottom:0.5rem}
  .draw-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.1rem;color:var(--red)}
  .draw-btn{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1rem;color:var(--white);
    background:var(--red);border:none;padding:0.7em 2.2em;border-radius:30px;cursor:pointer;
    margin-top:0.8rem;transition:all .2s;letter-spacing:0.06em}
  .draw-btn:hover{background:var(--blue);transform:scale(1.05)}
  .draw-btn:disabled{background:var(--green);cursor:default;transform:none}

  /* ═══ FLIP CARD ═══ */
  .flip-wrap{perspective:800px;width:220px;height:160px;margin:1rem auto;display:none}
  .flip-wrap.show{display:block}
  .flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(0.4,0,0.2,1)}
  .flip-card.flipped{transform:rotateY(180deg)}
  .flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
  .flip-front{background:var(--white);border:3px solid var(--red);
    /* Folk diamond inner border */
    box-shadow:inset 0 0 0 8px var(--white),inset 0 0 0 10px var(--yellow)}
  .flip-q{font-family:'Quicksand',sans-serif;font-weight:700;font-size:3rem;color:var(--red)}
  .flip-hint{font-size:0.72rem;color:var(--dark);opacity:0.3;margin-top:0.3rem}
  .flip-back{background:var(--red);transform:rotateY(180deg);color:var(--white)}
  .flip-label{font-size:0.82rem;opacity:0.7}
  .flip-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.5rem;margin:0.3rem 0}
  .flip-likes{font-size:0.82rem;opacity:0.8}

  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  .shaking{animation:shake .4s ease 2}

  /* ═══ FOOTER ═══ */
  .footer{text-align:center;animation:popIn .5s ease both;animation-delay:.8s}
  .footer-motto{font-family:'Quicksand',sans-serif;font-weight:500;font-size:0.82rem;color:var(--blue);opacity:0.35}
  .footer-disc{font-size:0.55rem;color:var(--dark);opacity:0.12;margin-top:0.2rem}

  @media(max-width:400px){body{padding:1rem}.flip-wrap{width:180px;height:140px}}
</style>
</head>
<body>

<!-- Rosemaling flowers -->
<div class="rose rf1"><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-center"></div></div>
<div class="rose rf2"><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-center"></div></div>
<div class="rose rf3"><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-center"></div></div>
<div class="rose rf4"><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-center"></div></div>

<div class="page">

  <div class="folk-border"></div>

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="h-brand">暖冬</div>
    <div class="h-en">WARMWINTER</div>
    <!-- Dala Horse -->
    <div class="dala">
      <div class="dala-head"></div>
      <div class="dala-body"></div>
      <div class="dala-tail"></div>
      <div class="dala-leg1"></div>
      <div class="dala-leg2"></div>
      <div class="dala-leg3"></div>
      <div class="dala-leg4"></div>
    </div>
    <div class="h-sub">2026 年末礼物交换</div>
  </header>

  <!-- ═══ RULES ═══ -->
  <div class="rules">
    <div class="rules-items">
      <span>预算 ¥50–100</span><span class="rules-dot">·</span>
      <span>12月25日交换</span><span class="rules-dot">·</span>
      <span>严格保密</span>
    </div>
  </div>

  <!-- ═══ PARTICIPANTS ═══ -->
  <div class="participants">
    <span class="p-chip" style="animation-delay:.2s">小林</span>
    <span class="p-chip" style="animation-delay:.25s">阿杰</span>
    <span class="p-chip" style="animation-delay:.3s">晓晓</span>
    <span class="p-chip" style="animation-delay:.35s">大伟</span>
    <span class="p-chip" style="animation-delay:.4s">小鱼</span>
    <span class="p-chip" style="animation-delay:.45s">阿瑞</span>
    <span class="p-chip" style="animation-delay:.5s">豆豆</span>
    <span class="p-chip" style="animation-delay:.55s">小美</span>
  </div>

  <!-- ═══ DRAW ═══ -->
  <div class="draw">
    <div class="draw-you">你是</div>
    <div class="draw-name">小林</div>
    <button class="draw-btn" id="drawBtn" onclick="drawSecret()">抽签</button>
  </div>

  <!-- ═══ FLIP CARD ═══ -->
  <div class="flip-wrap" id="flipWrap">
    <div class="flip-card" id="flipCard">
      <div class="flip-front">
        <div class="flip-q" id="flipQ">?</div>
        <div class="flip-hint">点击抽签揭晓</div>
      </div>
      <div class="flip-back">
        <div class="flip-label">你要送礼物给</div>
        <div class="flip-name">阿杰</div>
        <div class="flip-likes">TA 喜欢：摄影 · 咖啡 · 运动</div>
      </div>
    </div>
  </div>

  <div class="folk-border blue-bg bottom"></div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-motto">暖冬 · WARMWINTER · 温暖每一个冬天</div>
    <div class="footer-disc">虚构活动 · 仅供展示</div>
  </footer>

</div>

<script>
function drawSecret(){
  var wrap=document.getElementById('flipWrap');
  var card=document.getElementById('flipCard');
  var btn=document.getElementById('drawBtn');
  var q=document.getElementById('flipQ');

  // Show card
  wrap.classList.add('show');
  btn.disabled=true;
  btn.textContent='已抽签';

  // Suspense shake
  q.classList.add('shaking');
  setTimeout(function(){
    q.classList.remove('shaking');
    // Flip after shake
    setTimeout(function(){card.classList.add('flipped')},200);
  },800);
}
</script>
<script src="nav.js"></script>
</body>
</html>
